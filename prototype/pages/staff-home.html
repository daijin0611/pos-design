<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>员工首页 - POS H5 原型</title>
  <link rel="stylesheet" href="../css/design-system.css">
  <style>
    .header-area {
      background: linear-gradient(135deg, #4A6CF7 0%, #6B8AFF 100%);
      padding: 0 var(--space-lg) var(--space-xl);
      position: relative;
    }

    .header-area::after {
      content: '';
      position: absolute;
      bottom: -20px;
      left: 0;
      right: 0;
      height: 40px;
      background: var(--bg-primary);
      border-radius: 24px 24px 0 0;
    }

    .header-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: var(--space-sm) 0 var(--space-md);
    }

    .greeting h2 {
      font: 600 18px / 1.3 var(--font-family);
      color: var(--text-inverse);
    }

    .greeting p {
      font: 400 12px / 1.4 var(--font-family);
      color: rgba(255,255,255,0.7);
      margin-top: 2px;
    }

    .header-badge {
      padding: 4px 12px;
      border-radius: var(--radius-pill);
      background: rgba(255,255,255,0.2);
      font: 500 12px / 1 var(--font-family);
      color: white;
    }

    .store-switch {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 5px 12px;
      border-radius: var(--radius-pill);
      background: rgba(255,255,255,0.2);
      font: 500 12px / 1 var(--font-family);
      color: white;
      cursor: pointer;
      margin-bottom: 8px;
    }

    /* Store dropdown */
    .store-dropdown {
      display: none;
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      z-index: 500;
    }
    .store-dropdown.show { display: block; }
    .store-dropdown-mask {
      position: absolute; inset: 0;
      background: rgba(0,0,0,0.3);
    }
    .store-dropdown-inner {
      position: absolute;
      top: 120px; left: 50%;
      transform: translateX(-50%);
      background: var(--bg-white);
      border-radius: var(--radius-lg);
      box-shadow: 0 8px 32px rgba(0,0,0,0.15);
      padding: var(--space-sm) 0;
      min-width: 240px;
      z-index: 1;
    }
    .store-option {
      display: flex; align-items: center; gap: var(--space-sm);
      padding: var(--space-sm) var(--space-lg);
      cursor: pointer;
    }
    .store-option:active { background: var(--bg-primary); }
    .store-option .so-dot {
      width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
    }
    .store-option .so-name {
      font: 500 13px / 1.3 var(--font-family); color: var(--text-primary);
    }
    .store-option .so-balance {
      font: 400 11px / 1.3 var(--font-family); color: var(--text-tertiary); margin-top: 1px;
    }
    .store-option .so-check { color: #4A6CF7; font-size: 16px; visibility: hidden; }
    .store-option.active .so-check { visibility: visible; }
    .store-option.active .so-name { color: #4A6CF7; font-weight: 600; }

    /* Today overview — inside header */
    .today-overview {
      background: var(--bg-white);
      border-radius: var(--radius-lg);
      padding: var(--space-md) var(--space-sm);
      position: relative;
      z-index: 1;
      box-shadow: 0 4px 24px rgba(74, 108, 247, 0.15);
    }

    .today-overview__title {
      font: 600 13px / 1 var(--font-family);
      color: var(--text-primary);
      margin-bottom: var(--space-sm);
      padding-left: 8px;
    }

    .today-overview__grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .today-metric {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 8px 4px;
      border-radius: var(--radius-md);
      background: var(--bg-primary);
    }

    .today-metric__value {
      font: 700 15px / 1.1 var(--font-family);
    }

    .today-metric__unit {
      font: 400 9px / 1 var(--font-family);
      color: var(--text-tertiary);
    }

    .today-metric__label {
      font: 400 10px / 1 var(--font-family);
      color: var(--text-tertiary);
    }

    /* Quick entries */
    .quick-entries {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: var(--space-sm);
      padding: var(--space-xl) var(--space-lg);
    }

    .entry-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      cursor: pointer;
    }

    .entry-icon {
      width: 48px;
      height: 48px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
    }

    .entry-label {
      font: 500 11px / 1.2 var(--font-family);
      color: var(--text-secondary);
    }

    /* Reminder list */
    .reminder-card {
      display: flex;
      align-items: center;
      gap: var(--space-md);
      padding: var(--space-md) var(--space-lg);
      background: var(--bg-white);
      border-radius: var(--radius-md);
      margin-bottom: var(--space-sm);
      cursor: pointer;
      transition: background 0.2s;
    }

    .reminder-card:active {
      background: var(--bg-primary);
    }

    .reminder-avatar {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .reminder-info {
      flex: 1;
      min-width: 0;
    }

    .reminder-info h4 {
      font: 500 14px / 1.3 var(--font-family);
      color: var(--text-primary);
    }

    .reminder-info p {
      font: 400 12px / 1.3 var(--font-family);
      color: var(--text-tertiary);
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .reminder-time {
      font: 400 11px / 1 var(--font-family);
      color: var(--text-tertiary);
      flex-shrink: 0;
    }

    /* Salary card */
    .salary-card {
      background: var(--bg-white);
      border-radius: var(--radius-lg);
      padding: var(--space-lg);
      box-shadow: var(--shadow-card);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .salary-left .salary-month {
      font: 400 12px / 1 var(--font-family);
      color: var(--text-tertiary);
    }

    .salary-left .salary-amount {
      font: 700 28px / 1.2 var(--font-family);
      color: var(--text-primary);
      margin-top: 4px;
    }

    .salary-left .salary-amount::before {
      content: '¥ ';
      font-size: 16px;
      font-weight: 600;
    }

    /* Nav tabs for staff */
    .staff-tabs {
      display: flex;
      background: var(--bg-white);
      padding: 0 var(--space-lg);
      border-bottom: 1px solid var(--border-light);
    }

    .staff-tab {
      flex: 1;
      text-align: center;
      padding: var(--space-md) 0;
      font: 500 13px / 1 var(--font-family);
      color: var(--text-tertiary);
      position: relative;
      cursor: pointer;
    }

    .staff-tab.active {
      color: #4A6CF7;
      font-weight: 600;
    }

    .staff-tab.active::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 20px;
      height: 3px;
      background: #4A6CF7;
      border-radius: 2px;
    }

    .page-nav {
      position: fixed;
      top: 12px;
      right: 12px;
      z-index: 100;
      display: flex;
      gap: 6px;
    }

    .page-nav a {
      display: inline-flex;
      padding: 6px 12px;
      border-radius: var(--radius-pill);
      font: 500 11px / 1 var(--font-family);
      background: rgba(255,255,255,0.9);
      color: var(--primary);
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      text-decoration: none;
      transition: all 0.2s;
    }

    .page-nav a:hover, .page-nav a.active {
      background: var(--primary);
      color: white;
    }
  </style>
</head>
<body>
  <div class="page-nav">
    <a href="member-home.html">会员</a>
    <a href="staff-home.html" class="active">员工</a>
    <a href="admin-home.html">管理</a>
    <a href="global-login.html">登录</a>
  </div>

  <div class="phone-frame">
    <div class="status-bar light">9:41</div>

    <div class="page-content">
      <!-- Header -->
      <div class="header-area">
        <div class="header-top">
          <div class="greeting">
            <div class="store-switch" onclick="document.querySelector('.store-dropdown').classList.toggle('show')">
              <i class="van-icon van-icon-location-o" style="font-size:14px;"></i>
              <span id="storeSwitchName">万达店</span>
              <i class="van-icon van-icon-arrow-down" style="font-size:10px;"></i>
            </div>
            <h2>张技师，早上好</h2>
            <p>今天是你在刘丽德的第 386 天</p>
          </div>
          <div class="header-badge">高级技师</div>
        </div>

        <!-- Today overview (inside header) -->
        <div class="today-overview animate-in">
        <div class="today-overview__title">今日数据</div>
        <div class="today-overview__grid">
          <div class="today-metric">
            <div><span class="today-metric__value" style="color: #2CB5A0;">380.00</span></div>
            <div class="today-metric__label">今日工资</div>
          </div>
          <div class="today-metric">
            <div><span class="today-metric__value" style="color: #5B9BD5;">1,560</span><span class="today-metric__unit">元</span></div>
            <div class="today-metric__label">今日业绩</div>
          </div>
          <div class="today-metric">
            <div><span class="today-metric__value" style="color: #E8A849;">5</span><span class="today-metric__unit">个</span></div>
            <div class="today-metric__label">项目数</div>
          </div>
          <div class="today-metric">
            <div><span class="today-metric__value" style="color: #F5A0B5;">3</span><span class="today-metric__unit">件</span></div>
            <div class="today-metric__label">产品数</div>
          </div>
          <div class="today-metric">
            <div><span class="today-metric__value" style="color: #8B5CF6;">2</span><span class="today-metric__unit">张</span></div>
            <div class="today-metric__label">疗程卡</div>
          </div>
          <div class="today-metric">
            <div><span class="today-metric__value" style="color: #2CB5A0;">2,000</span><span class="today-metric__unit">元</span></div>
            <div class="today-metric__label">充值</div>
          </div>
        </div>
      </div>
      </div>

      <!-- Quick entries -->
      <div class="quick-entries animate-in delay-1">
        <a href="staff-salary.html" class="entry-item" style="text-decoration:none;">
          <div class="entry-icon" style="background: #EBF0FF;"><i class="van-icon van-icon-gold-coin-o" style="color: #4A6CF7;"></i></div>
          <span class="entry-label">工资查询</span>
        </a>
        <a href="staff-health-list.html" class="entry-item" style="text-decoration:none;">
          <div class="entry-icon" style="background: var(--primary-light);"><i class="van-icon van-icon-description" style="color: #2CB5A0;"></i></div>
          <span class="entry-label">健康档案</span>
        </a>
      </div>

      <!-- Salary quick view -->
      <div class="section animate-in delay-2">
        <div class="section-header">
          <span class="section-title">本月工资</span>
          <a href="staff-salary.html" class="section-more">查看详情 ›</a>
        </div>
        <div class="salary-card">
          <div class="salary-left">
            <div class="salary-month">2026年5月（截至25日）</div>
            <div class="salary-amount">8,640.00</div>
          </div>
          <span class="badge badge-success">已发放部分</span>
        </div>
      </div>

      <div style="height: 24px;"></div>
    </div>

    <!-- Store dropdown -->
    <div class="store-dropdown">
      <div class="store-dropdown-mask" onclick="document.querySelector('.store-dropdown').classList.remove('show')"></div>
      <div class="store-dropdown-inner">
        <div class="store-option active" data-name="万达店">
          <span class="so-dot" style="background: #4A6CF7;"></span>
          <div>
            <div class="so-name">万达店</div>
            <div class="so-balance">万达广场 3 楼</div>
          </div>
          <span class="so-check"><i class="van-icon van-icon-success"></i></span>
        </div>
        <div class="store-option" data-name="银泰店">
          <span class="so-dot" style="background: #8E9AAF;"></span>
          <div>
            <div class="so-name">银泰店</div>
            <div class="so-balance">银泰百货 5 楼</div>
          </div>
          <span class="so-check"><i class="van-icon van-icon-success"></i></span>
        </div>
        <div class="store-option" data-name="龙湖店">
          <span class="so-dot" style="background: #2CB5A0;"></span>
          <div>
            <div class="so-name">龙湖店</div>
            <div class="so-balance">龙湖天街 B1</div>
          </div>
          <span class="so-check"><i class="van-icon van-icon-success"></i></span>
        </div>
      </div>
    </div>

    <!-- Tab Bar (Staff) -->
    <div class="tab-bar staff-tab-bar">
      <div class="tab-item active">
        <span class="tab-icon"><i class="van-icon van-icon-home-o"></i></span>
        <span class="tab-label">首页</span>
      </div>
      <div class="tab-item" onclick="location.href='staff-profile.html'">
        <span class="tab-icon"><i class="van-icon van-icon-user-o"></i></span>
        <span class="tab-label">我的</span>
      </div>
    </div>
    <div class="safe-bottom"></div>
  </div>
  <script>
    /* ===== 门店切换逻辑 ===== */
    var STORE_KEY = 'pos_current_store';
    var dropdown = document.querySelector('.store-dropdown');
    var options = dropdown.querySelectorAll('.store-option');
    var switchName = document.getElementById('storeSwitchName');

    function selectStore(name, persist) {
      options.forEach(function(opt) {
        var match = opt.dataset.name === name;
        opt.classList.toggle('active', match);
        var balance = opt.querySelector('.so-balance');
        if (match) {
          balance.dataset.addr = balance.textContent;
          balance.textContent = '当前门店';
        } else if (balance.dataset.addr) {
          balance.textContent = balance.dataset.addr;
        }
      });
      switchName.textContent = name;
      if (persist) localStorage.setItem(STORE_KEY, name);
    }

    options.forEach(function(opt) {
      opt.addEventListener('click', function() {
        selectStore(opt.dataset.name, true);
        dropdown.classList.remove('show');
      });
    });

    var remembered = localStorage.getItem(STORE_KEY);
    if (remembered) selectStore(remembered, false);
  </script>
</body>
</html>
