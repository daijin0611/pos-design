<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>员工首页 - POS H5 原型</title>
  <link rel="stylesheet" href="../css/design-system.css">
  <style>
    .header-area {
      background: linear-gradient(135deg, #4A6CF7 0%, #6B8AFF 100%);
      padding: 0 var(--space-lg) var(--space-xl);
      position: relative;
    }

    .header-area::after {
      content: '';
      position: absolute;
      bottom: -20px;
      left: 0;
      right: 0;
      height: 40px;
      background: var(--bg-primary);
      border-radius: 24px 24px 0 0;
    }

    .header-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: var(--space-sm) 0 var(--space-md);
    }

    .greeting h2 {
      font: 600 18px / 1.3 var(--font-family);
      color: var(--text-inverse);
    }

    .greeting p {
      font: 400 12px / 1.4 var(--font-family);
      color: rgba(255,255,255,0.7);
      margin-top: 2px;
    }

    .header-badge {
      padding: 4px 12px;
      border-radius: var(--radius-pill);
      background: rgba(255,255,255,0.2);
      font: 500 12px / 1 var(--font-family);
      color: white;
    }

    /* Today stats */
    .today-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: var(--space-sm);
      position: relative;
      z-index: 1;
      margin-top: -4px;
    }

    .stat-card {
      background: var(--bg-white);
      border-radius: var(--radius-lg);
      padding: var(--space-md) var(--space-sm);
      text-align: center;
      box-shadow: var(--shadow-card);
    }

    .stat-card .stat-value {
      font: 700 22px / 1.2 var(--font-family);
      color: var(--text-primary);
    }

    .stat-card .stat-label {
      font: 400 11px / 1.3 var(--font-family);
      color: var(--text-tertiary);
      margin-top: 4px;
    }

    .stat-card.highlight .stat-value { color: #4A6CF7; }
    .stat-card.success .stat-value { color: var(--success); }
    .stat-card.warning .stat-value { color: var(--accent); }

    /* Quick entries */
    .quick-entries {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: var(--space-sm);
      padding: var(--space-xl) var(--space-lg);
    }

    .entry-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      cursor: pointer;
    }

    .entry-icon {
      width: 48px;
      height: 48px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
    }

    .entry-label {
      font: 500 11px / 1.2 var(--font-family);
      color: var(--text-secondary);
    }

    /* Reminder list */
    .reminder-card {
      display: flex;
      align-items: center;
      gap: var(--space-md);
      padding: var(--space-md) var(--space-lg);
      background: var(--bg-white);
      border-radius: var(--radius-md);
      margin-bottom: var(--space-sm);
      cursor: pointer;
      transition: background 0.2s;
    }

    .reminder-card:active {
      background: var(--bg-primary);
    }

    .reminder-avatar {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .reminder-info {
      flex: 1;
      min-width: 0;
    }

    .reminder-info h4 {
      font: 500 14px / 1.3 var(--font-family);
      color: var(--text-primary);
    }

    .reminder-info p {
      font: 400 12px / 1.3 var(--font-family);
      color: var(--text-tertiary);
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .reminder-time {
      font: 400 11px / 1 var(--font-family);
      color: var(--text-tertiary);
      flex-shrink: 0;
    }

    /* Salary card */
    .salary-card {
      background: var(--bg-white);
      border-radius: var(--radius-lg);
      padding: var(--space-lg);
      box-shadow: var(--shadow-card);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .salary-left .salary-month {
      font: 400 12px / 1 var(--font-family);
      color: var(--text-tertiary);
    }

    .salary-left .salary-amount {
      font: 700 28px / 1.2 var(--font-family);
      color: var(--text-primary);
      margin-top: 4px;
    }

    .salary-left .salary-amount::before {
      content: '¥ ';
      font-size: 16px;
      font-weight: 600;
    }

    /* Nav tabs for staff */
    .staff-tabs {
      display: flex;
      background: var(--bg-white);
      padding: 0 var(--space-lg);
      border-bottom: 1px solid var(--border-light);
    }

    .staff-tab {
      flex: 1;
      text-align: center;
      padding: var(--space-md) 0;
      font: 500 13px / 1 var(--font-family);
      color: var(--text-tertiary);
      position: relative;
      cursor: pointer;
    }

    .staff-tab.active {
      color: #4A6CF7;
      font-weight: 600;
    }

    .staff-tab.active::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 20px;
      height: 3px;
      background: #4A6CF7;
      border-radius: 2px;
    }

    .page-nav {
      position: fixed;
      top: 12px;
      right: 12px;
      z-index: 100;
      display: flex;
      gap: 6px;
    }

    .page-nav a {
      display: inline-flex;
      padding: 6px 12px;
      border-radius: var(--radius-pill);
      font: 500 11px / 1 var(--font-family);
      background: rgba(255,255,255,0.9);
      color: var(--primary);
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      text-decoration: none;
      transition: all 0.2s;
    }

    .page-nav a:hover, .page-nav a.active {
      background: var(--primary);
      color: white;
    }
  </style>
</head>
<body>
  <div class="page-nav">
    <a href="member-home.html">会员</a>
    <a href="staff-home.html" class="active">员工</a>
    <a href="admin-home.html">管理</a>
    <a href="global-login.html">登录</a>
  </div>

  <div class="phone-frame">
    <div class="status-bar light">9:41</div>

    <div class="page-content">
      <!-- Header -->
      <div class="header-area">
        <div class="header-top">
          <div class="greeting">
            <h2>张技师，早上好</h2>
            <p>今天是你在丽德的第 386 天</p>
          </div>
          <div class="header-badge">高级技师</div>
        </div>
      </div>

      <!-- Today stats -->
      <div class="section">
        <a href="staff-appointment.html" style="text-decoration:none; display:block;">
        <div class="today-stats animate-in">
          <div class="stat-card highlight">
            <div class="stat-value">6</div>
            <div class="stat-label">今日预约</div>
          </div>
          <div class="stat-card success">
            <div class="stat-value">4</div>
            <div class="stat-label">已完成</div>
          </div>
          <div class="stat-card warning">
            <div class="stat-value">2</div>
            <div class="stat-label">待跟进</div>
          </div>
        </div>
        </a>
      </div>

      <!-- Quick entries -->
      <div class="quick-entries animate-in delay-1">
        <a href="staff-salary.html" class="entry-item" style="text-decoration:none;">
          <div class="entry-icon" style="background: #EBF0FF;"><i class="van-icon van-icon-gold-coin-o" style="color: #4A6CF7;"></i></div>
          <span class="entry-label">工资查询</span>
        </a>
        <a href="staff-reminder.html" class="entry-item" style="text-decoration:none;">
          <div class="entry-icon" style="background: var(--primary-light);"><i class="van-icon van-icon-bell" style="color: #2CB5A0;"></i></div>
          <span class="entry-label">会员提醒</span>
        </a>
        <a href="staff-reminder.html" class="entry-item" style="text-decoration:none;">
          <div class="entry-icon" style="background: var(--secondary-light);"><i class="van-icon van-icon-cake-o" style="color: #F5A0B5;"></i></div>
          <span class="entry-label">生日提醒</span>
        </a>
        <a href="#" class="entry-item" style="text-decoration:none;">
          <div class="entry-icon" style="background: #E8F4FD;"><i class="van-icon van-icon-search" style="color: #5B9BD5;"></i></div>
          <span class="entry-label">会员查询</span>
        </a>
        <a href="staff-satisfaction.html" class="entry-item" style="text-decoration:none;">
          <div class="entry-icon" style="background: var(--accent-light);"><i class="van-icon van-icon-star-o" style="color: #E8A849;"></i></div>
          <span class="entry-label">满意度</span>
        </a>
        <a href="staff-checkout.html" class="entry-item" style="text-decoration:none;">
          <div class="entry-icon" style="background: #F0E8F8;"><i class="van-icon van-icon-card" style="color: #8B5CF6;"></i></div>
          <span class="entry-label">手机收银</span>
        </a>
        <div class="entry-item">
          <div class="entry-icon" style="background: var(--primary-light);"><i class="van-icon van-icon-bar-chart-o" style="color: #2CB5A0;"></i></div>
          <span class="entry-label">我的业绩</span>
        </div>
        <div class="entry-item">
          <div class="entry-icon" style="background: #E8F4FD;"><i class="van-icon van-icon-setting-o" style="color: #5B9BD5;"></i></div>
          <span class="entry-label">设置</span>
        </div>
      </div>

      <!-- Salary quick view -->
      <div class="section animate-in delay-2">
        <div class="section-header">
          <span class="section-title">本月工资</span>
          <span class="section-more">查看详情 ›</span>
        </div>
        <div class="salary-card">
          <div class="salary-left">
            <div class="salary-month">2026年5月（截至25日）</div>
            <div class="salary-amount">8,640.00</div>
          </div>
          <span class="badge badge-success">已发放部分</span>
        </div>
      </div>

      <!-- Member reminders -->
      <div class="section">
        <div class="section-header">
          <span class="section-title">今日待跟进</span>
          <span class="section-more">全部提醒 ›</span>
        </div>

        <div class="reminder-card animate-in delay-2">
          <div class="reminder-avatar" style="background: var(--secondary-light);"><i class="van-icon van-icon-contact" style="color: #F5A0B5;"></i></div>
          <div class="reminder-info">
            <h4>李女士 — 肩颈调理回访</h4>
            <p>上次服务：5月18日 · 建议调理周期已到</p>
          </div>
          <div class="reminder-time">2小时前</div>
        </div>

        <div class="reminder-card animate-in delay-3">
          <div class="reminder-avatar" style="background: var(--accent-light);"><i class="van-icon van-icon-cake-o" style="color: #E8A849;"></i></div>
          <div class="reminder-info">
            <h4>王女士 — 明天生日</h4>
            <p>VIP会员 · 可发送生日优惠券</p>
          </div>
          <div class="reminder-time">待处理</div>
        </div>

        <div class="reminder-card">
          <div class="reminder-avatar" style="background: var(--primary-light);"><i class="van-icon van-icon-contact" style="color: #2CB5A0;"></i></div>
          <div class="reminder-info">
            <h4>陈女士 — 全身SPA回访</h4>
            <p>上次服务：5月15日 · 满意度4.8分</p>
          </div>
          <div class="reminder-time">昨天</div>
        </div>
      </div>

      <div style="height: 24px;"></div>
    </div>

    <!-- Tab Bar (Staff) -->
    <div class="tab-bar staff-tab-bar">
      <div class="tab-item active">
        <span class="tab-icon"><i class="van-icon van-icon-home-o"></i></span>
        <span class="tab-label">工作台</span>
      </div>
      <div class="tab-item" onclick="location.href='staff-member-record.html'">
        <span class="tab-icon"><i class="van-icon van-icon-friends-o"></i></span>
        <span class="tab-label">会员</span>
      </div>
      <div class="tab-item">
        <span class="tab-icon"><i class="van-icon van-icon-bell"></i></span>
        <span class="tab-label">提醒</span>
      </div>
      <div class="tab-item">
        <span class="tab-icon"><i class="van-icon van-icon-user-o"></i></span>
        <span class="tab-label">我的</span>
      </div>
    </div>
    <div class="safe-bottom"></div>
  </div>
</body>
</html>
