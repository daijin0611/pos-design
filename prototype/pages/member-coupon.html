<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>M5 优惠券 - POS H5 原型</title>
  <link rel="stylesheet" href="../css/design-system.css">
  <style>
    /* Coupon tabs */
    .coupon-tabs {
      display: flex;
      background: var(--bg-white);
      padding: 0;
      border-bottom: 1px solid var(--border-light);
    }
    .coupon-tab {
      flex: 1;
      text-align: center;
      padding: var(--space-md) 0;
      font: 500 13px / 1 var(--font-family);
      color: var(--text-tertiary);
      position: relative;
      cursor: pointer;
    }
    .coupon-tab.active {
      color: var(--primary);
      font-weight: 600;
    }
    .coupon-tab.active::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 24px;
      height: 3px;
      background: var(--primary);
      border-radius: 2px;
    }
    .coupon-tab .tab-count {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 16px;
      height: 16px;
      border-radius: 8px;
      background: var(--danger);
      color: white;
      font: 600 9px / 1 var(--font-family);
      margin-left: 2px;
      padding: 0 4px;
    }

    /* Coupon card */
    .coupon-card {
      display: flex;
      margin: 0 var(--space-lg) var(--space-md);
      border-radius: var(--radius-lg);
      overflow: hidden;
      box-shadow: var(--shadow-card);
      background: var(--bg-white);
    }
    .coupon-card.used { opacity: 0.5; }
    .coupon-card.expired { opacity: 0.4; }
    .coupon-left {
      width: 100px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: var(--space-lg);
      position: relative;
      flex-shrink: 0;
    }
    .coupon-left::after {
      content: '';
      position: absolute;
      right: 0;
      top: 12px;
      bottom: 12px;
      width: 1px;
      border-left: 2px dashed var(--border);
    }
    .coupon-left .c-amount {
      font: 700 28px / 1 var(--font-family);
      color: white;
    }
    .coupon-left .c-unit {
      font: 400 11px / 1 var(--font-family);
      color: rgba(255,255,255,0.8);
      margin-top: 2px;
    }
    .coupon-left.discount { background: var(--secondary); }
    .coupon-left.cash { background: var(--primary); }
    .coupon-left.gift { background: var(--accent); }
    .coupon-right {
      flex: 1;
      padding: var(--space-md) var(--space-lg);
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .coupon-right .c-title {
      font: 600 15px / 1.3 var(--font-family);
      color: var(--text-primary);
    }
    .coupon-right .c-desc {
      font: 400 12px / 1.4 var(--font-family);
      color: var(--text-tertiary);
      margin-top: 4px;
    }
    .coupon-right .c-date {
      font: 400 10px / 1 var(--font-family);
      color: var(--text-placeholder);
      margin-top: 6px;
    }
    .coupon-right .c-use {
      align-self: flex-end;
      margin-top: 4px;
    }
    .coupon-right .c-use-btn {
      padding: 4px 14px;
      border-radius: var(--radius-pill);
      font: 500 11px / 1 var(--font-family);
      border: none;
      cursor: pointer;
    }
    .c-use-btn.available {
      background: var(--primary);
      color: white;
    }
    .c-use-btn.used-btn {
      background: var(--bg-primary);
      color: var(--text-tertiary);
    }

    .page-nav {
      position: fixed; top: 12px; right: 12px; z-index: 100; display: flex; gap: 6px;
    }
    .page-nav a {
      display: inline-flex; padding: 6px 12px; border-radius: var(--radius-pill);
      font: 500 11px / 1 var(--font-family); background: rgba(255,255,255,0.9);
      color: var(--primary); box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      text-decoration: none; transition: all 0.2s;
    }
    .page-nav a:hover { background: var(--primary); color: white; }
    .page-nav a.active { background: var(--primary); color: white; }
  </style>
</head>
<body>
  <div class="page-nav">
    <a href="member-home.html" class="active">会员</a>
    <a href="staff-home.html">员工</a>
    <a href="admin-home.html">管理</a>
    <a href="global-login.html">登录</a>
  </div>

  <div class="phone-frame">
    <div class="status-bar">9:41</div>
    <div class="nav-bar">
      <div class="nav-back" onclick="history.back()">‹</div>
      <span class="nav-title">我的优惠券</span>
    </div>

    <!-- Coupon tabs -->
    <div class="coupon-tabs">
      <div class="coupon-tab active">可使用 <span class="tab-count">3</span></div>
      <div class="coupon-tab">已使用</div>
      <div class="coupon-tab">已过期</div>
    </div>

    <div class="page-content" style="padding-top: var(--space-md);">
      <!-- Available coupons -->
      <div class="coupon-card animate-in">
        <div class="coupon-left cash">
          <div class="c-amount">50</div>
          <div class="c-unit">满200可用</div>
        </div>
        <div class="coupon-right">
          <div class="c-title">满减优惠券</div>
          <div class="c-desc">全场项目通用 · 不可叠加使用</div>
          <div class="c-date">有效期至 2026-06-30</div>
          <div class="c-use"><button class="c-use-btn available">去使用</button></div>
        </div>
      </div>

      <div class="coupon-card animate-in delay-1">
        <div class="coupon-left discount">
          <div class="c-amount">8折</div>
          <div class="c-unit">肩颈专用</div>
        </div>
        <div class="coupon-right">
          <div class="c-title">肩颈调理专属折扣</div>
          <div class="c-desc">仅限肩颈调理项目 · 每人限用1次</div>
          <div class="c-date">有效期至 2026-06-15</div>
          <div class="c-use"><button class="c-use-btn available">去使用</button></div>
        </div>
      </div>

      <div class="coupon-card animate-in delay-2">
        <div class="coupon-left gift">
          <div class="c-amount">赠</div>
          <div class="c-unit">体验项目</div>
        </div>
        <div class="coupon-right">
          <div class="c-title">新项目免费体验券</div>
          <div class="c-desc">肩颈深度调理免费体验1次 · 需提前预约</div>
          <div class="c-date">有效期至 2026-07-31</div>
          <div class="c-use"><button class="c-use-btn available">去使用</button></div>
        </div>
      </div>

      <!-- Used coupon (example) -->
      <div class="coupon-card used animate-in delay-3">
        <div class="coupon-left cash" style="background: var(--text-placeholder);">
          <div class="c-amount">30</div>
          <div class="c-unit">满100可用</div>
        </div>
        <div class="coupon-right">
          <div class="c-title">满减优惠券</div>
          <div class="c-desc">全场项目通用</div>
          <div class="c-date">已于 2026-05-10 使用</div>
          <div class="c-use"><button class="c-use-btn used-btn">已使用</button></div>
        </div>
      </div>

      <div style="height: 24px;"></div>
    </div>

    <div class="tab-bar">
      <div class="tab-item" onclick="location.href='member-home.html'">
        <span class="tab-icon"><i class="van-icon van-icon-home-o"></i></span>
        <span class="tab-label">首页</span>
      </div>
      <div class="tab-item active">
        <span class="tab-icon"><i class="van-icon van-icon-calendar-o"></i></span>
        <span class="tab-label">预约</span>
      </div>
      <div class="tab-item active">
        <span class="tab-icon"><i class="van-icon van-icon-coupon-o"></i></span>
        <span class="tab-label">优惠券</span>
      </div>
      <div class="tab-item">
        <span class="tab-icon"><i class="van-icon van-icon-user-o"></i></span>
        <span class="tab-label">我的</span>
      </div>
    </div>
    <div class="safe-bottom"></div>
  </div>

  <script src="../js/prototype.js"></script>
</body>
</html>
