<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>密码管理 - 员工端 POS H5 原型</title>
  <link rel="stylesheet" href="../css/design-system.css">
  <style>
    /* 员工端主题色覆盖（蓝） */
    :root {
      --primary: #4A6CF7;
      --primary-light: #ECF0FE;
      --primary-dark: #3A5AE0;
      --primary-gradient: linear-gradient(135deg, #4A6CF7 0%, #6B8AFF 100%);
    }

    /* ===== Tabs ===== */
    .pwd-tabs {
      display: flex; background: var(--bg-white);
      border-bottom: 1px solid var(--border-light);
    }
    .pwd-tab {
      flex: 1; text-align: center;
      padding: var(--space-md) 0;
      font: 500 14px / 1 var(--font-family);
      color: var(--text-tertiary);
      position: relative; cursor: pointer;
    }
    .pwd-tab.active { color: var(--primary); font-weight: 600; }
    .pwd-tab.active::after {
      content: ''; position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
      width: 24px; height: 3px; background: var(--primary); border-radius: 2px;
    }

    /* ===== Form ===== */
    .form-card {
      background: var(--bg-white);
      padding: var(--space-lg);
      margin-top: var(--space-md);
    }
    .form-group { margin-bottom: var(--space-lg); }
    .form-group:last-child { margin-bottom: 0; }
    .form-label {
      display: block;
      font: 500 13px / 1 var(--font-family);
      color: var(--text-secondary); margin-bottom: 8px;
    }
    .form-input-wrap {
      display: flex; align-items: center; gap: var(--space-sm);
      background: var(--bg-primary);
      border-radius: var(--radius-md);
      padding: 0 var(--space-md);
    }
    .form-input {
      flex: 1; border: none; background: transparent;
      padding: 12px 0;
      font: 400 15px / 1.2 var(--font-family);
      color: var(--text-primary);
      outline: none;
    }
    .form-input::placeholder { color: var(--text-placeholder); }
    .input-icon { font-size: 18px; color: var(--text-tertiary); }
    .eye-icon {
      font-size: 18px; color: var(--text-tertiary);
      cursor: pointer; padding: 4px;
    }

    .form-hint {
      font: 400 11px / 1.4 var(--font-family);
      color: var(--text-tertiary); margin-top: 6px;
    }

    /* ===== Info banner ===== */
    .info-banner {
      display: flex; gap: var(--space-sm);
      margin: var(--space-md) var(--space-lg) 0;
      padding: var(--space-md);
      background: var(--accent-light);
      border-radius: var(--radius-md);
    }
    .info-banner .ib-icon {
      font-size: 16px; color: var(--accent); flex-shrink: 0;
    }
    .info-banner .ib-text {
      font: 400 12px / 1.5 var(--font-family);
      color: var(--accent-dark);
    }
    .info-banner .ib-text strong { font-weight: 600; }

    /* ===== Submit button ===== */
    .submit-btn {
      display: block; width: calc(100% - var(--space-lg) * 2);
      margin: var(--space-xl) var(--space-lg) 0;
      padding: 14px 0;
      border: none; border-radius: var(--radius-pill);
      background: var(--primary-gradient);
      color: white;
      font: 600 15px / 1 var(--font-family);
      cursor: pointer;
      box-shadow: 0 6px 16px rgba(74, 108, 247, 0.3);
    }

    /* ===== Verify code input ===== */
    .code-input-wrap {
      display: flex; gap: var(--space-sm); align-items: center;
    }
    .code-input-wrap .form-input-wrap { flex: 1; }
    .code-btn {
      flex-shrink: 0;
      padding: 10px 14px;
      border: 1px solid var(--primary);
      border-radius: var(--radius-md);
      background: var(--bg-white);
      color: var(--primary);
      font: 500 12px / 1 var(--font-family);
      cursor: pointer;
      white-space: nowrap;
    }
    .code-btn:active { background: var(--primary-light); }

    /* ===== Page nav ===== */
    .page-nav {
      position: fixed; top: 12px; right: 12px; z-index: 100;
      display: flex; gap: 6px;
    }
    .page-nav a {
      display: inline-flex; padding: 6px 12px;
      border-radius: var(--radius-pill);
      font: 500 11px / 1 var(--font-family);
      background: rgba(255,255,255,0.9);
      color: var(--primary);
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      text-decoration: none; transition: all 0.2s;
    }
    .page-nav a:hover, .page-nav a.active {
      background: var(--primary); color: white;
    }

    .panel { display: none; }
    .panel.active { display: block; }
  </style>
</head>
<body>
  <div class="page-nav">
    <a href="member-home.html">会员</a>
    <a href="staff-home.html" class="active">员工</a>
    <a href="admin-home.html">管理</a>
    <a href="global-login.html">登录</a>
  </div>

  <div class="phone-frame">
    <div class="status-bar">9:41</div>
    <div class="nav-bar">
      <div class="nav-back" onclick="location.href='staff-profile.html'">‹</div>
      <span class="nav-title">密码管理</span>
    </div>

    <div class="page-content">
      <!-- Tabs -->
      <div class="pwd-tabs">
        <div class="pwd-tab active" data-tab="modify">修改密码</div>
        <div class="pwd-tab" data-tab="forgot">忘记密码</div>
      </div>

      <!-- Panel: Modify password -->
      <div class="panel active" id="panel-modify">
        <div class="form-card animate-in">
          <div class="form-group">
            <label class="form-label">旧密码</label>
            <div class="form-input-wrap">
              <i class="van-icon van-icon-lock input-icon"></i>
              <input type="password" class="form-input" placeholder="请输入当前密码">
              <i class="van-icon van-icon-eye-o eye-icon"></i>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">新密码</label>
            <div class="form-input-wrap">
              <i class="van-icon van-icon-lock input-icon"></i>
              <input type="password" class="form-input" placeholder="8-20位，含字母+数字">
              <i class="van-icon van-icon-eye-o eye-icon"></i>
            </div>
            <p class="form-hint">密码长度 8-20 位，需同时包含字母和数字</p>
          </div>
          <div class="form-group">
            <label class="form-label">确认新密码</label>
            <div class="form-input-wrap">
              <i class="van-icon van-icon-lock input-icon"></i>
              <input type="password" class="form-input" placeholder="请再次输入新密码">
              <i class="van-icon van-icon-eye-o eye-icon"></i>
            </div>
            <p class="form-hint">新密码不能与旧密码相同</p>
          </div>
        </div>

        <div class="info-banner animate-in delay-1">
          <span class="ib-icon"><i class="van-icon van-icon-warning-o"></i></span>
          <span class="ib-text">
            连续 <strong>5 次</strong> 输入错误将锁定账户 30 分钟；修改成功后其他端登录态将失效，需重新登录。
          </span>
        </div>

        <button class="submit-btn animate-in delay-2">确认修改</button>
      </div>

      <!-- Panel: Forgot password -->
      <div class="panel" id="panel-forgot">
        <div class="form-card animate-in">
          <div class="form-group">
            <label class="form-label">手机号</label>
            <div class="form-input-wrap">
              <i class="van-icon van-icon-phone-o input-icon"></i>
              <input type="tel" class="form-input" placeholder="请输入绑定的手机号" maxlength="11">
            </div>
            <p class="form-hint">仅可向已绑定员工的手机号下发验证码</p>
          </div>
          <div class="form-group">
            <label class="form-label">短信验证码</label>
            <div class="code-input-wrap">
              <div class="form-input-wrap">
                <i class="van-icon van-icon-envelop-o input-icon"></i>
                <input type="text" class="form-input" placeholder="6位数字验证码" maxlength="6">
              </div>
              <button class="code-btn">获取验证码</button>
            </div>
            <p class="form-hint">同一手机号 60s 内限发 1 次，每日上限 10 条</p>
          </div>
          <div class="form-group">
            <label class="form-label">设置新密码</label>
            <div class="form-input-wrap">
              <i class="van-icon van-icon-lock input-icon"></i>
              <input type="password" class="form-input" placeholder="8-20位，含字母+数字">
              <i class="van-icon van-icon-eye-o eye-icon"></i>
            </div>
          </div>
        </div>

        <div class="info-banner animate-in delay-1">
          <span class="ib-icon"><i class="van-icon van-icon-warning-o"></i></span>
          <span class="ib-text">
            连续 <strong>3 次</strong> 验证失败将锁定 30 分钟；验证码 5 分钟内有效。
          </span>
        </div>

        <button class="submit-btn animate-in delay-2">重置密码</button>
      </div>
    </div>

    <!-- Tab Bar (Staff) -->
    <div class="tab-bar staff-tab-bar">
      <a href="staff-home.html" class="tab-item" style="text-decoration:none;">
        <span class="tab-icon"><i class="van-icon van-icon-home-o"></i></span>
        <span class="tab-label">首页</span>
      </a>
      <a href="staff-profile.html" class="tab-item active" style="text-decoration:none;">
        <span class="tab-icon"><i class="van-icon van-icon-user-o"></i></span>
        <span class="tab-label">我的</span>
      </a>
    </div>
    <div class="safe-bottom"></div>
  </div>

  <script src="../js/prototype.js"></script>
  <script>
    // Tab switching for modify / forgot password
    document.querySelectorAll('.pwd-tab').forEach(function(tab) {
      tab.addEventListener('click', function() {
        document.querySelectorAll('.pwd-tab').forEach(function(t) { t.classList.remove('active'); });
        document.querySelectorAll('.panel').forEach(function(p) { p.classList.remove('active'); });
        tab.classList.add('active');
        document.getElementById('panel-' + tab.dataset.tab).classList.add('active');
      });
    });
  </script>
</body>
</html>
