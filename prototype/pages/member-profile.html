<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>我的 - POS H5 原型</title>
  <link rel="stylesheet" href="../css/design-system.css">
  <style>
    /* Header */
    .header-area {
      background: var(--primary-gradient);
      padding: 0 var(--space-lg) var(--space-xxl);
      position: relative;
      text-align: center;
    }

    .header-area::after {
      content: '';
      position: absolute;
      bottom: -20px;
      left: 0;
      right: 0;
      height: 40px;
      background: var(--bg-primary);
      border-radius: 24px 24px 0 0;
    }

    .profile-avatar {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: rgba(255,255,255,0.25);
      margin: 0 auto var(--space-md);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
    }

    .profile-name {
      font: 600 20px / 1.3 var(--font-family);
      color: var(--text-inverse);
    }

    .profile-meta {
      font: 400 12px / 1.4 var(--font-family);
      color: rgba(255,255,255,0.75);
      margin-top: 4px;
    }

    /* Personal info card */
    .info-card {
      background: var(--bg-white);
      border-radius: var(--radius-xl);
      margin: -24px var(--space-lg) 0;
      padding: var(--space-sm) var(--space-lg);
      box-shadow: 0 4px 24px rgba(44, 181, 160, 0.15);
      position: relative;
      z-index: 1;
    }
    .info-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--space-md) 0;
    }
    .info-row + .info-row {
      border-top: 1px solid var(--border-light);
    }
    .info-label {
      font: 400 14px / 1.3 var(--font-family);
      color: var(--text-tertiary);
      flex-shrink: 0;
    }
    .info-value {
      font: 500 14px / 1.3 var(--font-family);
      color: var(--text-primary);
      text-align: right;
    }
    .info-avatar-mini {
      width: 40px; height: 40px; border-radius: 50%;
      background: var(--primary-gradient);
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
    }
    .info-level {
      padding: 3px 10px; border-radius: var(--radius-pill);
      background: var(--accent-light);
      color: var(--accent-dark);
      font: 500 12px / 1 var(--font-family);
    }

    /* Menu list */
    .menu-card {
      background: var(--bg-white);
      border-radius: var(--radius-lg);
      margin: var(--space-lg) var(--space-lg) var(--space-sm);
      box-shadow: var(--shadow-card);
      overflow: hidden;
    }

    .menu-item {
      display: flex;
      align-items: center;
      padding: var(--space-md) var(--space-lg);
      cursor: pointer;
      transition: background 0.15s;
    }

    .menu-item:active {
      background: var(--border-light);
    }

    .menu-item + .menu-item {
      border-top: 1px solid var(--border-light);
    }

    .menu-icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      margin-right: var(--space-md);
      flex-shrink: 0;
    }

    .menu-text {
      flex: 1;
      font: 500 14px / 1.3 var(--font-family);
      color: var(--text-primary);
    }

    .menu-arrow {
      color: var(--text-placeholder);
      font-size: 14px;
    }

    /* Page nav */
    .page-nav {
      position: fixed;
      top: 12px;
      right: 12px;
      z-index: 100;
      display: flex;
      gap: 6px;
    }

    .page-nav a {
      display: inline-flex;
      padding: 6px 12px;
      border-radius: var(--radius-pill);
      font: 500 11px / 1 var(--font-family);
      background: rgba(255,255,255,0.9);
      color: var(--primary);
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      text-decoration: none;
      transition: all 0.2s;
    }

    .page-nav a:hover {
      background: var(--primary);
      color: white;
    }

    .page-nav a.active {
      background: var(--primary);
      color: white;
    }
  </style>
</head>
<body>
  <div class="page-nav">
    <a href="member-home.html">会员</a>
    <a href="member-profile.html" class="active">我的</a>
    <a href="staff-home.html">员工</a>
    <a href="admin-home.html">管理</a>
    <a href="global-login.html">登录</a>
  </div>

  <div class="phone-frame">
    <!-- Status bar -->
    <div class="status-bar light">9:41</div>

    <!-- Scrollable content -->
    <div class="page-content">
      <!-- Header with gradient -->
      <div class="header-area">
        <div style="padding-top: var(--space-md);"></div>
        <div class="profile-avatar"><i class="van-icon van-icon-user-o" style="color: white;"></i></div>
        <div class="profile-name">张小姐</div>
        <div class="profile-meta">金卡会员 · LD20260001</div>
      </div>

      <!-- 个人信息卡片 -->
      <div class="info-card animate-in">
        <div class="info-row">
          <span class="info-label">头像</span>
          <span class="info-avatar-mini"><i class="van-icon van-icon-user-o" style="color: white;"></i></span>
        </div>
        <div class="info-row">
          <span class="info-label">昵称</span>
          <span class="info-value">张小姐</span>
        </div>
        <div class="info-row">
          <span class="info-label">手机号</span>
          <span class="info-value">138****6688</span>
        </div>
        <div class="info-row">
          <span class="info-label">会员卡号</span>
          <span class="info-value">LD20260001</span>
        </div>
        <div class="info-row">
          <span class="info-label">会员等级</span>
          <span class="info-value"><span class="info-level">金卡会员</span></span>
        </div>
        <div class="info-row">
          <span class="info-label">性别</span>
          <span class="info-value">女</span>
        </div>
        <div class="info-row">
          <span class="info-label">生日</span>
          <span class="info-value">1995-08-08</span>
        </div>
      </div>

      <!-- Menu list -->
      <div class="menu-card animate-in delay-1">
        <div class="menu-item" onclick="location.href='member-password.html'">
          <div class="menu-icon" style="background: var(--accent-light);"><i class="van-icon van-icon-key" style="color: #E8A849;"></i></div>
          <span class="menu-text">密码管理</span>
          <span class="menu-arrow"><i class="van-icon van-icon-arrow"></i></span>
        </div>
      </div>

      <div style="height: 24px;"></div>
    </div>

    <!-- Tab Bar -->
    <div class="tab-bar">
      <a href="member-home.html" class="tab-item" style="text-decoration:none;">
        <span class="tab-icon"><i class="van-icon van-icon-home-o"></i></span>
        <span class="tab-label">首页</span>
      </a>
      <a href="member-profile.html" class="tab-item active" style="text-decoration:none;">
        <span class="tab-icon"><i class="van-icon van-icon-user-o"></i></span>
        <span class="tab-label">我的</span>
      </a>
    </div>
    <div class="safe-bottom"></div>
  </div>
</body>
</html>
