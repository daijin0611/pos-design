<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>我的 - POS H5 原型</title>
  <link rel="stylesheet" href="../css/design-system.css">
  <style>
    /* Header */
    .header-area {
      background: var(--primary-gradient);
      padding: 0 var(--space-lg) var(--space-xxl);
      position: relative;
      text-align: center;
    }

    .header-area::after {
      content: '';
      position: absolute;
      bottom: -20px;
      left: 0;
      right: 0;
      height: 40px;
      background: var(--bg-primary);
      border-radius: 24px 24px 0 0;
    }

    .profile-avatar {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: rgba(255,255,255,0.25);
      margin: 0 auto var(--space-md);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
    }

    .profile-name {
      font: 600 20px / 1.3 var(--font-family);
      color: var(--text-inverse);
    }

    .profile-meta {
      font: 400 12px / 1.4 var(--font-family);
      color: rgba(255,255,255,0.75);
      margin-top: 4px;
    }

    /* Stats card */
    .stats-card {
      background: var(--bg-white);
      border-radius: var(--radius-xl);
      padding: var(--space-lg) var(--space-sm);
      display: flex;
      justify-content: space-around;
      position: relative;
      z-index: 1;
      margin: -24px var(--space-lg) 0;
      box-shadow: 0 4px 24px rgba(44, 181, 160, 0.15);
    }

    .stats-item {
      text-align: center;
      flex: 1;
      cursor: pointer;
    }

    .stats-item .stats-value {
      font: 700 18px / 1.2 var(--font-family);
    }

    .stats-item .stats-label {
      font: 400 10px / 1.3 var(--font-family);
      color: var(--text-tertiary);
      margin-top: 2px;
    }

    .stats-item.balance .stats-value { color: var(--primary); }
    .stats-item.coupons .stats-value { color: var(--secondary); }
    .stats-item.orders .stats-value { color: var(--text-secondary); }

    /* Member cards */
    .cards-section {
      margin: var(--space-lg) var(--space-lg) 0;
    }
    .cards-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: var(--space-md);
    }
    .cards-header .ch-title {
      font: 600 15px / 1 var(--font-family);
      color: var(--text-primary);
    }
    .cards-header .ch-count {
      font: 400 12px / 1 var(--font-family);
      color: var(--text-placeholder);
    }
    .member-card {
      background: var(--bg-white);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-card);
      overflow: hidden;
      margin-bottom: var(--space-md);
      cursor: pointer;
      transition: transform 0.15s;
    }
    .member-card:active { transform: scale(0.98); }
    .mc-banner {
      padding: var(--space-lg);
      position: relative;
      overflow: hidden;
    }
    .mc-banner::before {
      content: '';
      position: absolute;
      top: -20px;
      right: -20px;
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: rgba(255,255,255,0.1);
    }
    .mc-banner::after {
      content: '';
      position: absolute;
      bottom: -30px;
      right: 20px;
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: rgba(255,255,255,0.06);
    }
    .mc-banner.gold { background: linear-gradient(135deg, #C9A96E 0%, #E8C878 50%, #D4A94E 100%); }
    .mc-banner.silver { background: linear-gradient(135deg, #8E9AAF 0%, #B8C4D0 50%, #9EAAB8 100%); }
    .mc-banner.platinum { background: linear-gradient(135deg, #2CB5A0 0%, #3DD1BA 50%, #25A090 100%); }
    .mc-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      position: relative;
      z-index: 1;
    }
    .mc-type {
      font: 600 14px / 1 var(--font-family);
      color: white;
      background: rgba(255,255,255,0.2);
      padding: 3px 10px;
      border-radius: var(--radius-pill);
    }
    .mc-store {
      font: 400 12px / 1 var(--font-family);
      color: rgba(255,255,255,0.85);
      margin-top: 6px;
    }
    .mc-no {
      font: 400 11px / 1 var(--font-family);
      color: rgba(255,255,255,0.6);
      margin-top: 4px;
    }
    .mc-discount {
      text-align: right;
    }
    .mc-discount-value {
      font: 700 24px / 1 var(--font-family);
      color: white;
    }
    .mc-discount-label {
      font: 400 10px / 1 var(--font-family);
      color: rgba(255,255,255,0.7);
      margin-top: 2px;
    }
    .mc-bottom {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: var(--space-md) var(--space-lg);
      background: var(--bg-white);
    }
    .mc-balance-label {
      font: 400 11px / 1 var(--font-family);
      color: var(--text-tertiary);
    }
    .mc-balance-value {
      font: 700 20px / 1.2 var(--font-family);
      color: var(--primary);
      margin-top: 2px;
    }
    .mc-balance-value::before {
      content: '¥';
      font-size: 12px;
      font-weight: 600;
    }
    .mc-action {
      padding: 6px 16px;
      border-radius: var(--radius-pill);
      font: 500 12px / 1 var(--font-family);
      color: var(--primary);
      background: var(--primary-light);
      border: none;
      cursor: pointer;
    }

    /* Menu list */
    .menu-card {
      background: var(--bg-white);
      border-radius: var(--radius-lg);
      margin: var(--space-lg) var(--space-lg) var(--space-sm);
      box-shadow: var(--shadow-card);
      overflow: hidden;
    }

    .menu-item {
      display: flex;
      align-items: center;
      padding: var(--space-md) var(--space-lg);
      cursor: pointer;
      transition: background 0.15s;
    }

    .menu-item:active {
      background: var(--border-light);
    }

    .menu-item + .menu-item {
      border-top: 1px solid var(--border-light);
    }

    .menu-icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      margin-right: var(--space-md);
      flex-shrink: 0;
    }

    .menu-text {
      flex: 1;
      font: 500 14px / 1.3 var(--font-family);
      color: var(--text-primary);
    }

    .menu-arrow {
      color: var(--text-placeholder);
      font-size: 14px;
    }

    /* Page nav */
    .page-nav {
      position: fixed;
      top: 12px;
      right: 12px;
      z-index: 100;
      display: flex;
      gap: 6px;
    }

    .page-nav a {
      display: inline-flex;
      padding: 6px 12px;
      border-radius: var(--radius-pill);
      font: 500 11px / 1 var(--font-family);
      background: rgba(255,255,255,0.9);
      color: var(--primary);
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      text-decoration: none;
      transition: all 0.2s;
    }

    .page-nav a:hover {
      background: var(--primary);
      color: white;
    }

    .page-nav a.active {
      background: var(--primary);
      color: white;
    }
  </style>
</head>
<body>

      <!-- Menu list -->

    <!-- Tab Bar -->

</body>
