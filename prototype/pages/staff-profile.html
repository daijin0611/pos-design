<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>我的 - 员工端 POS H5 原型</title>
  <link rel="stylesheet" href="../css/design-system.css">
  <style>
    /* 员工端主题色覆盖（蓝） */
    :root {
      --primary: #4A6CF7;
      --primary-light: #ECF0FE;
      --primary-dark: #3A5AE0;
      --primary-gradient: linear-gradient(135deg, #4A6CF7 0%, #6B8AFF 100%);
    }

    /* ===== Header ===== */
    .header-area {
      background: var(--primary-gradient);
      padding: 0 var(--space-lg) var(--space-xxl);
      position: relative;
      text-align: center;
    }
    .header-area::after {
      content: '';
      position: absolute;
      bottom: -20px;
      left: 0;
      right: 0;
      height: 40px;
      background: var(--bg-primary);
      border-radius: 24px 24px 0 0;
    }
    .profile-avatar {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      margin: 0 auto var(--space-md);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      overflow: hidden;
      cursor: pointer;
      position: relative;
      background: rgba(255,255,255,0.25);
    }
    .profile-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .profile-avatar .pa-edit {
      position: absolute; bottom: -2px; right: -2px;
      width: 22px; height: 22px; border-radius: 50%;
      background: white; color: var(--primary);
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    }
    .profile-name {
      font: 600 20px / 1.3 var(--font-family);
      color: var(--text-inverse);
    }
    .profile-meta {
      font: 400 12px / 1.4 var(--font-family);
      color: rgba(255,255,255,0.75);
      margin-top: 4px;
    }

    /* ===== Info card ===== */
    .info-card {
      background: var(--bg-white);
      border-radius: var(--radius-xl);
      margin: -24px var(--space-lg) 0;
      padding: var(--space-sm) var(--space-lg);
      box-shadow: 0 4px 24px rgba(74, 108, 247, 0.15);
      position: relative;
      z-index: 1;
    }
    .info-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--space-md) 0;
    }
    .info-row + .info-row { border-top: 1px solid var(--border-light); }
    .info-label {
      font: 400 14px / 1.3 var(--font-family);
      color: var(--text-tertiary);
      flex-shrink: 0;
    }
    .info-right {
      display: flex; align-items: center; gap: var(--space-sm);
      max-width: 60%;
    }
    .info-value {
      font: 500 14px / 1.3 var(--font-family);
      color: var(--text-primary);
      text-align: right;
    }
    /* 只读字段：灰色 */
    .info-row.readonly .info-value { color: var(--text-tertiary); }
    /* 可编辑行 */
    .info-row.editable { cursor: pointer; transition: background 0.15s; }
    .info-row.editable:active { background: var(--bg-primary); }
    .info-arrow { color: var(--text-placeholder); font-size: 14px; }
    .info-row.readonly .info-arrow { display: none; }

    .info-avatar-mini {
      width: 40px; height: 40px; border-radius: 50%;
      overflow: hidden;
      background: var(--primary-gradient);
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
    }
    .info-avatar-mini img { width: 100%; height: 100%; object-fit: cover; }
    /* 生日待完善提示 */
    .info-pending {
      padding: 3px 10px; border-radius: var(--radius-pill);
      background: var(--accent-light);
      color: var(--accent-dark);
      font: 500 11px / 1 var(--font-family);
      white-space: nowrap;
    }

    /* ===== Menu list ===== */
    .menu-card {
      background: var(--bg-white);
      border-radius: var(--radius-lg);
      margin: var(--space-lg) var(--space-lg) var(--space-sm);
      box-shadow: var(--shadow-card);
      overflow: hidden;
    }
    .menu-item {
      display: flex;
      align-items: center;
      padding: var(--space-md) var(--space-lg);
      cursor: pointer;
      transition: background 0.15s;
      text-decoration: none;
    }
    .menu-item:active { background: var(--border-light); }
    .menu-item + .menu-item { border-top: 1px solid var(--border-light); }
    .menu-icon {
      width: 36px; height: 36px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; margin-right: var(--space-md); flex-shrink: 0;
    }
    .menu-text {
      flex: 1;
      font: 500 14px / 1.3 var(--font-family);
      color: var(--text-primary);
    }
    .menu-arrow { color: var(--text-placeholder); font-size: 14px; }

    /* ===== Bottom sheet (Action Sheet / Picker) ===== */
    .sheet-mask {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.45); z-index: 600;
    }
    .sheet-mask.show { display: block; }
    .sheet {
      position: fixed; left: 0; right: 0; bottom: 0;
      background: var(--bg-white);
      border-radius: 20px 20px 0 0;
      z-index: 601; display: none; flex-direction: column;
      animation: slideUp 0.25s ease-out;
      max-height: 80%;
    }
    .sheet.show { display: flex; }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .sheet-handle { width: 36px; height: 4px; border-radius: 2px; background: var(--border); margin: 10px auto 4px; }
    .sheet-title { font: 600 15px / 1 var(--font-family); color: var(--text-primary); text-align: center; padding: 0 var(--space-lg) var(--space-sm); }
    .sheet-body { padding: var(--space-sm) var(--space-lg) var(--space-lg); }

    /* Action sheet 选项 */
    .as-option {
      display: flex; align-items: center; gap: var(--space-md);
      padding: var(--space-md); cursor: pointer;
      transition: background 0.15s;
    }
    .as-option:active { background: var(--bg-primary); }
    .as-option + .as-option { border-top: 1px solid var(--border-light); }
    .as-icon { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
    .as-text { flex: 1; font: 500 14px / 1.3 var(--font-family); color: var(--text-primary); }
    .as-cancel {
      text-align: center; padding: var(--space-md);
      font: 500 14px / 1 var(--font-family); color: var(--text-tertiary);
      border-top: 8px solid var(--bg-primary); cursor: pointer;
    }
    .as-cancel:active { background: var(--bg-primary); }

    /* 性别选项（带选中态） */
    .pick-option {
      display: flex; align-items: center; gap: var(--space-md);
      padding: var(--space-md); cursor: pointer;
      transition: background 0.15s;
    }
    .pick-option:active { background: var(--bg-primary); }
    .pick-option + .pick-option { border-top: 1px solid var(--border-light); }
    .pick-text { flex: 1; font: 500 14px / 1.3 var(--font-family); color: var(--text-primary); }
    .pick-check { font-size: 16px; color: var(--primary); visibility: hidden; }
    .pick-option.selected .pick-check { visibility: visible; }
    .pick-option.selected .pick-text { color: var(--primary); font-weight: 600; }

    /* ===== Center dialog (昵称输入) ===== */
    .dialog-mask {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.45); z-index: 600;
      align-items: center; justify-content: center;
    }
    .dialog-mask.show { display: flex; }
    .dialog {
      width: 80%; max-width: 300px; background: var(--bg-white);
      border-radius: var(--radius-lg); overflow: hidden;
      animation: dialogIn 0.2s ease-out;
    }
    @keyframes dialogIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .dialog-title { font: 600 16px / 1.3 var(--font-family); color: var(--text-primary); text-align: center; padding: var(--space-lg) var(--space-lg) var(--space-sm); }
    .dialog-body { padding: var(--space-sm) var(--space-lg) var(--space-md); }
    .dialog-input {
      width: 100%; box-sizing: border-box;
      padding: 12px var(--space-md);
      background: var(--bg-primary); border: 1px solid transparent;
      border-radius: var(--radius-md);
      font: 400 15px / 1.2 var(--font-family);
      color: var(--text-primary); outline: none;
      transition: border-color 0.15s;
    }
    .dialog-input:focus { border-color: var(--primary); background: var(--bg-white); }
    .dialog-actions { display: flex; border-top: 1px solid var(--border-light); }
    .dialog-btn {
      flex: 1; padding: var(--space-md) 0; cursor: pointer;
      font: 500 15px / 1 var(--font-family);
      text-align: center; background: none; border: none;
    }
    .dialog-btn:active { background: var(--bg-primary); }
    .dialog-btn.cancel { color: var(--text-tertiary); border-right: 1px solid var(--border-light); }
    .dialog-btn.confirm { color: var(--primary); font-weight: 600; }
    .dialog-btn.confirm:disabled { color: var(--text-placeholder); cursor: not-allowed; }

    /* ===== Toast ===== */
    .toast {
      display: none; position: fixed; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0,0,0,0.8); color: white;
      padding: 12px 24px; border-radius: var(--radius-md);
      font: 500 13px / 1.4 var(--font-family); z-index: 999;
    }
    .toast.show { display: block; }

    /* ===== Page nav ===== */
    .page-nav {
      position: fixed; top: 12px; right: 12px; z-index: 100;
      display: flex; gap: 6px;
    }
    .page-nav a {
      display: inline-flex; padding: 6px 12px;
      border-radius: var(--radius-pill);
      font: 500 11px / 1 var(--font-family);
      background: rgba(255,255,255,0.9); color: var(--primary);
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      text-decoration: none; transition: all 0.2s;
    }
    .page-nav a:hover, .page-nav a.active { background: var(--primary); color: white; }

    .hidden-date { position: absolute; left: -9999px; opacity: 0; width: 1px; height: 1px; }
  </style>
</head>
<body>
  <div class="page-nav">
    <a href="member-home.html">会员</a>
    <a href="staff-home.html" class="active">员工</a>
    <a href="admin-home.html">管理</a>
    <a href="global-login.html">登录</a>
  </div>

  <div class="phone-frame">
    <div class="status-bar light">9:41</div>

    <div class="page-content">
      <!-- Header -->
      <div class="header-area">
        <div style="padding-top: var(--space-md);"></div>
        <div class="profile-avatar" id="bigAvatar" onclick="openAvatarSheet()">
          <i class="van-icon van-icon-user-o" style="color: white;" id="bigAvatarIcon"></i>
          <span class="pa-edit"><i class="van-icon van-icon-photograph"></i></span>
        </div>
        <div class="profile-name" id="headerName">张技师</div>
        <div class="profile-meta">高级技师 · 工号 S20240012</div>
      </div>

      <!-- 个人信息卡片 -->
      <div class="info-card animate-in">
        <!-- 头像 -->
        <div class="info-row editable" onclick="openAvatarSheet()">
          <span class="info-label">头像</span>
          <span class="info-right">
            <span class="info-avatar-mini" id="miniAvatar">
              <i class="van-icon van-icon-user-o" style="color: white;" id="miniAvatarIcon"></i>
            </span>
            <i class="van-icon van-icon-arrow info-arrow"></i>
          </span>
        </div>
        <!-- 昵称 -->
        <div class="info-row editable" onclick="openNicknameDialog()">
          <span class="info-label">昵称</span>
          <span class="info-right">
            <span class="info-value" id="nickValue">张技师</span>
            <i class="van-icon van-icon-arrow info-arrow"></i>
          </span>
        </div>
        <!-- 工号（只读） -->
        <div class="info-row readonly">
          <span class="info-label">工号</span>
          <span class="info-right">
            <span class="info-value">S20240012</span>
          </span>
        </div>
        <!-- 职位（只读） -->
        <div class="info-row readonly">
          <span class="info-label">职位</span>
          <span class="info-right">
            <span class="info-value">高级技师</span>
          </span>
        </div>
        <!-- 手机号（只读） -->
        <div class="info-row readonly">
          <span class="info-label">手机号</span>
          <span class="info-right">
            <span class="info-value">138****6688</span>
          </span>
        </div>
        <!-- 性别 -->
        <div class="info-row editable" onclick="openGenderSheet()">
          <span class="info-label">性别</span>
          <span class="info-right">
            <span class="info-value" id="genderValue">女</span>
            <i class="van-icon van-icon-arrow info-arrow"></i>
          </span>
        </div>
        <!-- 生日 -->
        <div class="info-row editable" id="birthdayRow" onclick="triggerDatePicker()">
          <span class="info-label">生日</span>
          <span class="info-right" id="birthdayRight">
            <span class="info-value" id="birthdayValue"></span>
            <i class="van-icon van-icon-arrow info-arrow"></i>
          </span>
        </div>
      </div>

      <!-- Menu list -->
      <div class="menu-card animate-in delay-1">
        <a class="menu-item" href="staff-password.html">
          <div class="menu-icon" style="background: var(--primary-light);"><i class="van-icon van-icon-key" style="color: #4A6CF7;"></i></div>
          <span class="menu-text">密码管理</span>
          <span class="menu-arrow"><i class="van-icon van-icon-arrow"></i></span>
        </a>
      </div>

      <div style="height: 24px;"></div>
    </div>

    <!-- Tab Bar (Staff) -->
    <div class="tab-bar staff-tab-bar">
      <a href="staff-home.html" class="tab-item" style="text-decoration:none;">
        <span class="tab-icon"><i class="van-icon van-icon-home-o"></i></span>
        <span class="tab-label">首页</span>
      </a>
      <a href="staff-profile.html" class="tab-item active" style="text-decoration:none;">
        <span class="tab-icon"><i class="van-icon van-icon-user-o"></i></span>
        <span class="tab-label">我的</span>
      </a>
    </div>
    <div class="safe-bottom"></div>
  </div>

  <!-- ===== Avatar Action Sheet ===== -->
  <div class="sheet-mask" id="avatarMask" onclick="closeAvatarSheet()"></div>
  <div class="sheet" id="avatarSheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">更换头像</div>
    <div class="sheet-body" style="padding-bottom: 0;">
      <div class="as-option" onclick="pickAvatar('camera')">
        <div class="as-icon" style="background: #EBF0FF;"><i class="van-icon van-icon-photograph" style="color: #4A6CF7;"></i></div>
        <span class="as-text">拍照</span>
      </div>
      <div class="as-option" onclick="pickAvatar('album')">
        <div class="as-icon" style="background: var(--primary-light);"><i class="van-icon van-icon-photo-o" style="color: #2CB5A0;"></i></div>
        <span class="as-text">从相册选择</span>
      </div>
      <div class="as-cancel" onclick="closeAvatarSheet()">取消</div>
    </div>
  </div>

  <!-- ===== Gender Sheet ===== -->
  <div class="sheet-mask" id="genderMask" onclick="closeGenderSheet()"></div>
  <div class="sheet" id="genderSheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">选择性别</div>
    <div class="sheet-body" style="padding-bottom: 0;">
      <div class="pick-option" data-val="男" onclick="pickGender('男')">
        <span class="pick-text">男</span>
        <i class="van-icon van-icon-success pick-check"></i>
      </div>
      <div class="pick-option" data-val="女" onclick="pickGender('女')">
        <span class="pick-text">女</span>
        <i class="van-icon van-icon-success pick-check"></i>
      </div>
      <div class="pick-option" data-val="保密" onclick="pickGender('保密')">
        <span class="pick-text">保密</span>
        <i class="van-icon van-icon-success pick-check"></i>
      </div>
      <div class="as-cancel" onclick="closeGenderSheet()">取消</div>
    </div>
  </div>

  <!-- ===== Nickname Dialog ===== -->
  <div class="dialog-mask" id="nickMask" onclick="if(event.target===this)closeNicknameDialog()">
    <div class="dialog">
      <div class="dialog-title">修改昵称</div>
      <div class="dialog-body">
        <input type="text" class="dialog-input" id="nickInput" maxlength="12" placeholder="请输入昵称">
      </div>
      <div class="dialog-actions">
        <button class="dialog-btn cancel" onclick="closeNicknameDialog()">取消</button>
        <button class="dialog-btn confirm" id="nickConfirm" onclick="saveNickname()">确定</button>
      </div>
    </div>
  </div>

  <!-- Hidden native date input -->
  <input type="date" class="hidden-date" id="dateInput" onchange="pickBirthday(this.value)">

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script>
    /* ===== Mock data layer (localStorage) ===== */
    var STORAGE_KEY = 'pos_staff_profile_v1';
    // 占位头像（模拟微信 JS-SDK 拍照/相册上传结果）
    // 用彩色渐变背景 + 首字母模拟，避免外链图片加载失败
    var AVATAR_POOL = [
      { bg: 'linear-gradient(135deg,#FF8A8A,#FFC2C2)', letter: '技' },
      { bg: 'linear-gradient(135deg,#8AC9FF,#C2E5FF)', letter: '师' },
      { bg: 'linear-gradient(135deg,#FFC28A,#FFE0B0)', letter: '雅' },
      { bg: 'linear-gradient(135deg,#B59CFF,#D8C8FF)', letter: '兰' }
    ];

    var DEFAULTS = {
      avatarIdx: -1,        // -1 = 默认图标头像
      nick: '张技师',
      gender: '女',
      birthday: ''          // 空 = 待完善
    };

    function load() {
      try {
        var raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return Object.assign({}, DEFAULTS);
        return Object.assign({}, DEFAULTS, JSON.parse(raw));
      } catch (e) { return Object.assign({}, DEFAULTS); }
    }
    function save(d) { localStorage.setItem(STORAGE_KEY, JSON.stringify(d)); }

    var state = load();

    /* ===== Render ===== */
    function applyAvatar() {
      var a = state.avatarIdx >= 0 ? AVATAR_POOL[state.avatarIdx % AVATAR_POOL.length] : null;
      var bigImg = document.getElementById('bigAvatar');
      var miniImg = document.getElementById('miniAvatar');
      var bigIcon = document.getElementById('bigAvatarIcon');
      var miniIcon = document.getElementById('miniAvatarIcon');
      if (a) {
        bigImg.style.background = a.bg;
        bigIcon.style.display = 'none';
        bigImg.setAttribute('data-letter', a.letter);
        bigImg.querySelectorAll('.pa-letter').forEach(function(n){ n.remove(); });
        var ls = document.createElement('span');
        ls.className = 'pa-letter'; ls.textContent = a.letter;
        ls.style.cssText = 'color:#fff;font-size:28px;font-weight:600;';
        bigImg.insertBefore(ls, bigImg.firstChild);

        miniImg.style.background = a.bg;
        miniIcon.style.display = 'none';
        miniImg.querySelectorAll('.pa-letter').forEach(function(n){ n.remove(); });
        var ls2 = document.createElement('span');
        ls2.className = 'pa-letter'; ls2.textContent = a.letter;
        ls2.style.cssText = 'color:#fff;font-size:20px;font-weight:600;';
        miniImg.insertBefore(ls2, miniImg.firstChild);
      } else {
        bigImg.style.background = '';
        bigIcon.style.display = '';
        bigImg.querySelectorAll('.pa-letter').forEach(function(n){ n.remove(); });
        miniImg.style.background = '';
        miniIcon.style.display = '';
        miniImg.querySelectorAll('.pa-letter').forEach(function(n){ n.remove(); });
      }
    }
    function applyAll() {
      applyAvatar();
      document.getElementById('nickValue').textContent = state.nick;
      document.getElementById('headerName').textContent = state.nick;
      document.getElementById('genderValue').textContent = state.gender;
      renderBirthday();
      document.querySelectorAll('#genderSheet .pick-option').forEach(function(o){
        o.classList.toggle('selected', o.dataset.val === state.gender);
      });
    }
    function renderBirthday() {
      var valEl = document.getElementById('birthdayValue');
      var rightEl = document.getElementById('birthdayRight');
      var arrow = rightEl.querySelector('.info-arrow');
      var oldPending = rightEl.querySelector('.info-pending');
      if (oldPending) oldPending.remove();
      if (!state.birthday) {
        valEl.textContent = '';
        var pending = document.createElement('span');
        pending.className = 'info-pending';
        pending.textContent = '待完善';
        rightEl.insertBefore(pending, arrow);
      } else {
        valEl.textContent = state.birthday;
      }
    }

    /* ===== Avatar ===== */
    function openAvatarSheet() {
      document.getElementById('avatarMask').classList.add('show');
      document.getElementById('avatarSheet').classList.add('show');
    }
    function closeAvatarSheet() {
      document.getElementById('avatarMask').classList.remove('show');
      document.getElementById('avatarSheet').classList.remove('show');
    }
    function pickAvatar(type) {
      state.avatarIdx = (state.avatarIdx + 1 + AVATAR_POOL.length) % AVATAR_POOL.length;
      save(state);
      applyAvatar();
      closeAvatarSheet();
      toast('头像更新成功');
    }

    /* ===== Nickname ===== */
    function openNicknameDialog() {
      var input = document.getElementById('nickInput');
      input.value = state.nick;
      document.getElementById('nickMask').classList.add('show');
      setTimeout(function(){
        input.focus();
        input.select();
      }, 100);
    }
    function closeNicknameDialog() {
      document.getElementById('nickMask').classList.remove('show');
    }
    function saveNickname() {
      var v = document.getElementById('nickInput').value.trim();
      if (!v) { toast('昵称不能为空'); return; }
      state.nick = v; save(state);
      document.getElementById('nickValue').textContent = v;
      document.getElementById('headerName').textContent = v;
      closeNicknameDialog();
      toast('已保存');
    }

    /* ===== Gender ===== */
    function openGenderSheet() {
      document.querySelectorAll('#genderSheet .pick-option').forEach(function(o){
        o.classList.toggle('selected', o.dataset.val === state.gender);
      });
      document.getElementById('genderMask').classList.add('show');
      document.getElementById('genderSheet').classList.add('show');
    }
    function closeGenderSheet() {
      document.getElementById('genderMask').classList.remove('show');
      document.getElementById('genderSheet').classList.remove('show');
    }
    function pickGender(val) {
      state.gender = val; save(state);
      document.getElementById('genderValue').textContent = val;
      closeGenderSheet();
      toast('已保存');
    }

    /* ===== Birthday ===== */
    function triggerDatePicker() {
      var di = document.getElementById('dateInput');
      if (state.birthday) di.value = state.birthday; else di.value = '';
      di.click();
    }
    function pickBirthday(val) {
      if (!val) return;
      state.birthday = val; save(state);
      renderBirthday();
      toast('已保存');
    }

    /* ===== Toast ===== */
    var toastTimer = null;
    function toast(msg) {
      var t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(function(){ t.classList.remove('show'); }, 1500);
    }

    /* ===== Init ===== */
    applyAll();
  </script>
</body>
</html>
