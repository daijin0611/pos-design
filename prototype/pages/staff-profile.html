<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>我的 - 员工端 POS H5 原型</title>
  <link rel="stylesheet" href="../css/design-system.css">
  <style>
    /* ===== Header ===== */
    .header-area {
      background: linear-gradient(135deg, #4A6CF7 0%, #6B8AFF 100%);
      padding: 0 var(--space-lg) var(--space-xxl);
      position: relative;
      text-align: center;
    }
    .header-area::after {
      content: '';
      position: absolute;
      bottom: -20px; left: 0; right: 0;
      height: 40px;
      background: var(--bg-primary);
      border-radius: 24px 24px 0 0;
    }
    .profile-avatar {
      width: 64px; height: 64px; border-radius: 50%;
      background: rgba(255,255,255,0.25);
      margin: 0 auto var(--space-md);
      display: flex; align-items: center; justify-content: center;
      font-size: 30px;
    }
    .profile-name {
      font: 600 20px / 1.3 var(--font-family);
      color: var(--text-inverse);
    }
    .profile-meta {
      font: 400 12px / 1.4 var(--font-family);
      color: rgba(255,255,255,0.75);
      margin-top: 4px;
    }

    /* ===== Stats card ===== */
    .stats-card {
      background: var(--bg-white);
      border-radius: var(--radius-xl);
      padding: var(--space-lg) var(--space-sm);
      display: flex; justify-content: space-around;
      position: relative; z-index: 1;
      margin: -24px var(--space-lg) 0;
      box-shadow: 0 4px 24px rgba(74, 108, 247, 0.15);
    }
    .stats-item { text-align: center; flex: 1; cursor: pointer; }
    .stats-value { font: 700 16px / 1.2 var(--font-family); }
    .stats-label { font: 400 10px / 1.3 var(--font-family); color: var(--text-tertiary); margin-top: 2px; }

    /* ===== Menu list ===== */
    .menu-card {
      background: var(--bg-white);
      border-radius: var(--radius-lg);
      margin: var(--space-lg) var(--space-lg) var(--space-sm);
      box-shadow: var(--shadow-card);
      overflow: hidden;
    }
    .menu-group-title {
      font: 600 12px / 1 var(--font-family);
      color: var(--text-tertiary);
      padding: var(--space-md) var(--space-lg) var(--space-sm);
    }
    .menu-item {
      display: flex; align-items: center;
      padding: var(--space-md) var(--space-lg);
      cursor: pointer; transition: background 0.15s;
      text-decoration: none;
    }
    .menu-item:active { background: var(--border-light); }
    .menu-item + .menu-item { border-top: 1px solid var(--border-light); }
    .menu-icon {
      width: 36px; height: 36px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; margin-right: var(--space-md); flex-shrink: 0;
    }
    .menu-text {
      flex: 1; font: 500 14px / 1.3 var(--font-family); color: var(--text-primary);
    }
    .menu-arrow { color: var(--text-placeholder); font-size: 14px; }

    /* ===== Logout ===== */
    .logout-area {
      text-align: center;
      padding: var(--space-xxl) var(--space-lg);
    }
    .logout-btn {
      color: var(--danger);
      font: 500 14px / 1 var(--font-family);
      text-decoration: none;
      cursor: pointer;
    }

    .page-nav {
      position: fixed; top: 12px; right: 12px; z-index: 100; display: flex; gap: 6px;
    }
    .page-nav a {
      display: inline-flex; padding: 6px 12px; border-radius: var(--radius-pill);
      font: 500 11px / 1 var(--font-family); background: rgba(255,255,255,0.9);
      color: var(--primary); box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      text-decoration: none; transition: all 0.2s;
    }
    .page-nav a:hover { background: var(--primary); color: white; }
    .page-nav a.active { background: var(--primary); color: white; }
  </style>
</head>
<body>
  <div class="page-nav">
    <a href="member-home.html">会员</a>
    <a href="staff-home.html" class="active">员工</a>
    <a href="admin-home.html">管理</a>
    <a href="global-login.html">登录</a>
  </div>

  <div class="phone-frame">
    <div class="status-bar light">9:41</div>

    <div class="page-content">
      <!-- Header -->
      <div class="header-area">
        <div style="padding-top: var(--space-md);"></div>
        <div class="profile-avatar"><i class="van-icon van-icon-user-o" style="color: white;"></i></div>
        <div class="profile-name">张技师</div>
        <div class="profile-meta">高级技师 · 工号 S20240012</div>
      </div>

      <!-- Stats -->
      <div class="stats-card animate-in">
        <div class="stats-item">
          <div class="stats-value" style="color: #4A6CF7;">¥8,640</div>
          <div class="stats-label">本月工资</div>
        </div>
        <div class="stats-item">
          <div class="stats-value" style="color: #2CB5A0;">156</div>
          <div class="stats-label">服务次数</div>
        </div>
        <div class="stats-item">
          <div class="stats-value" style="color: #E8A849;">98%</div>
          <div class="stats-label">好评率</div>
        </div>
        <div class="stats-item">
          <div class="stats-value" style="color: #8B5CF6;">386</div>
          <div class="stats-label">在职天数</div>
        </div>
      </div>

      <!-- Menu: Work -->
      <div class="menu-card animate-in delay-1">
        <div class="menu-group-title">工作相关</div>
        <div class="menu-item">
          <div class="menu-icon" style="background: #EBF0FF;"><i class="van-icon van-icon-calendar-o" style="color: #4A6CF7;"></i></div>
          <span class="menu-text">我的排班</span>
          <span class="menu-arrow"><i class="van-icon van-icon-arrow"></i></span>
        </div>
        <div class="menu-item">
          <div class="menu-icon" style="background: var(--primary-light);"><i class="van-icon van-icon-bar-chart-o" style="color: #2CB5A0;"></i></div>
          <span class="menu-text">我的业绩</span>
          <span class="menu-arrow"><i class="van-icon van-icon-arrow"></i></span>
        </div>
        <a href="staff-satisfaction.html" class="menu-item">
          <div class="menu-icon" style="background: var(--accent-light);"><i class="van-icon van-icon-star-o" style="color: #E8A849;"></i></div>
          <span class="menu-text">满意度评价</span>
          <span class="menu-arrow"><i class="van-icon van-icon-arrow"></i></span>
        </a>
        <a href="staff-salary.html" class="menu-item">
          <div class="menu-icon" style="background: #F0E8F8;"><i class="van-icon van-icon-gold-coin-o" style="color: #8B5CF6;"></i></div>
          <span class="menu-text">工资查询</span>
          <span class="menu-arrow"><i class="van-icon van-icon-arrow"></i></span>
        </a>
      </div>

      <!-- Menu: Settings -->
      <div class="menu-card animate-in delay-2">
        <div class="menu-group-title">个人设置</div>
        <div class="menu-item">
          <div class="menu-icon" style="background: #EBF0FF;"><i class="van-icon van-icon-user-o" style="color: #4A6CF7;"></i></div>
          <span class="menu-text">个人信息</span>
          <span class="menu-arrow"><i class="van-icon van-icon-arrow"></i></span>
        </div>
        <div class="menu-item">
          <div class="menu-icon" style="background: #F0F0F0;"><i class="van-icon van-icon-lock" style="color: #999;"></i></div>
          <span class="menu-text">修改密码</span>
          <span class="menu-arrow"><i class="van-icon van-icon-arrow"></i></span>
        </div>
        <div class="menu-item">
          <div class="menu-icon" style="background: var(--secondary-light);"><i class="van-icon van-icon-bell" style="color: #F5A0B5;"></i></div>
          <span class="menu-text">消息通知</span>
          <span class="menu-arrow"><i class="van-icon van-icon-arrow"></i></span>
        </div>
        <div class="menu-item">
          <div class="menu-icon" style="background: #F0F0F0;"><i class="van-icon van-icon-info-o" style="color: #999;"></i></div>
          <span class="menu-text">关于</span>
          <span class="menu-arrow"><i class="van-icon van-icon-arrow"></i></span>
        </div>
      </div>

      <!-- Logout -->
      <div class="logout-area animate-in delay-3">
        <a href="global-login.html" class="logout-btn">退出登录</a>
      </div>

      <div style="height: 24px;"></div>
    </div>

    <!-- Tab Bar (Staff) -->
    <div class="tab-bar staff-tab-bar">
      <div class="tab-item" onclick="location.href='staff-home.html'">
        <span class="tab-icon"><i class="van-icon van-icon-home-o"></i></span>
        <span class="tab-label">首页</span>
      </div>
      <div class="tab-item active">
        <span class="tab-icon"><i class="van-icon van-icon-user-o"></i></span>
        <span class="tab-label">我的</span>
      </div>
    </div>
    <div class="safe-bottom"></div>
  </div>

  <script src="../js/prototype.js"></script>
</body>
</html>
