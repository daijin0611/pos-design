<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>M6 门店查询 - POS H5 原型</title>
  <link rel="stylesheet" href="../css/design-system.css">
  <style>
    /* Map placeholder */
    .map-area {
      height: 200px;
      background: linear-gradient(135deg, #E8F4E8 0%, #D4E8D4 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }
    .map-area::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(44,181,160,0.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(44,181,160,0.08) 1px, transparent 1px);
      background-size: 30px 30px;
    }
    .map-pin {
      position: relative;
      z-index: 1;
      text-align: center;
    }
    .map-pin-icon {
      font-size: 32px;
      animation: bounce 2s infinite;
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
    .map-pin-text {
      font: 500 12px / 1 var(--font-family);
      color: var(--text-secondary);
      margin-top: 4px;
    }
    /* Search bar */
    .search-bar {
      display: flex;
      align-items: center;
      gap: var(--space-sm);
      padding: var(--space-md) var(--space-lg);
    }
    .search-input {
      flex: 1;
      height: 40px;
      border-radius: var(--radius-pill);
      background: var(--bg-white);
      border: 1px solid var(--border);
      padding: 0 var(--space-lg);
      font: var(--font-body);
      color: var(--text-primary);
      display: flex;
      align-items: center;
      gap: var(--space-sm);
    }
    .search-input span {
      color: var(--text-placeholder);
    }
    .filter-btn {
      width: 40px;
      height: 40px;
      border-radius: var(--radius-md);
      background: var(--bg-white);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      cursor: pointer;
    }
    /* Store list */
    .store-item {
      display: flex;
      gap: var(--space-md);
      padding: var(--space-lg);
      background: var(--bg-white);
      margin: 0 var(--space-lg) var(--space-md);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-card);
      cursor: pointer;
      transition: all 0.2s;
    }
    .store-item:active { background: var(--primary-light); }
    .store-img {
      width: 80px;
      height: 80px;
      border-radius: var(--radius-md);
      background: linear-gradient(135deg, var(--primary-light), #D4E8D4);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      flex-shrink: 0;
    }
    .store-detail { flex: 1; }
    .store-detail h4 {
      font: 600 15px / 1.3 var(--font-family);
      color: var(--text-primary);
    }
    .store-detail .store-addr {
      font: 400 12px / 1.4 var(--font-family);
      color: var(--text-tertiary);
      margin-top: 4px;
    }
    .store-detail .store-tags {
      display: flex;
      gap: 6px;
      margin-top: 8px;
      flex-wrap: wrap;
    }
    .store-tag {
      padding: 2px 8px;
      border-radius: var(--radius-pill);
      font: 500 10px / 1.2 var(--font-family);
    }
    .store-dist {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .dist-text {
      font: 500 12px / 1 var(--font-family);
      color: var(--primary);
    }
    .nav-btn {
      padding: 6px 12px;
      border-radius: var(--radius-pill);
      background: var(--primary-light);
      color: var(--primary);
      font: 500 11px / 1 var(--font-family);
      border: none;
      cursor: pointer;
    }

    .page-nav {
      position: fixed; top: 12px; right: 12px; z-index: 100; display: flex; gap: 6px;
    }
    .page-nav a {
      display: inline-flex; padding: 6px 12px; border-radius: var(--radius-pill);
      font: 500 11px / 1 var(--font-family); background: rgba(255,255,255,0.9);
      color: var(--primary); box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      text-decoration: none; transition: all 0.2s;
    }
    .page-nav a:hover { background: var(--primary); color: white; }
    .page-nav a.active { background: var(--primary); color: white; }
  </style>
</head>
<body>
  <div class="page-nav">
    <a href="member-home.html" class="active">会员</a>
    <a href="staff-home.html">员工</a>
    <a href="admin-home.html">管理</a>
    <a href="global-login.html">登录</a>
  </div>

  <div class="phone-frame">
    <div class="status-bar">9:41</div>
    <div class="nav-bar">
      <div class="nav-back" onclick="history.back()">‹</div>
      <span class="nav-title">门店查询</span>
    </div>

    <div class="page-content">
      <!-- Map area -->
      <div class="map-area animate-in">
        <div class="map-pin">
          <div class="map-pin-icon"><i class="van-icon van-icon-location-o"></i></div>
          <div class="map-pin-text">当前位置附近 3 家门店</div>
        </div>
      </div>

      <!-- Search bar -->
      <div class="search-bar">
        <div class="search-input">
          <span><i class="van-icon van-icon-search"></i></span>
          <span>搜索门店名称或地址</span>
        </div>
        <div class="filter-btn"><i class="van-icon van-icon-setting-o"></i></div>
      </div>

      <!-- Store list -->
      <div class="store-item animate-in delay-1">
        <div class="store-img">🏪</div>
        <div class="store-detail">
          <h4>刘丽德健康·万达店</h4>
          <div class="store-addr">杭州市西湖区万达广场3楼 L308</div>
          <div class="store-tags">
            <span class="store-tag" style="background: var(--primary-light); color: var(--primary);">营业中</span>
            <span class="store-tag" style="background: var(--accent-light); color: var(--accent-dark);">WiFi</span>
            <span class="store-tag" style="background: var(--secondary-light); color: var(--secondary-dark);">停车场</span>
          </div>
        </div>
        <div class="store-dist">
          <span class="dist-text">1.2km</span>
          <button class="nav-btn">导航</button>
        </div>
      </div>

      <div class="store-item animate-in delay-2">
        <div class="store-img">🏪</div>
        <div class="store-detail">
          <h4>刘丽德健康·银泰店</h4>
          <div class="store-addr">杭州市拱墅区银泰百货B1层 B108</div>
          <div class="store-tags">
            <span class="store-tag" style="background: var(--primary-light); color: var(--primary);">营业中</span>
            <span class="store-tag" style="background: var(--accent-light); color: var(--accent-dark);">WiFi</span>
          </div>
        </div>
        <div class="store-dist">
          <span class="dist-text">3.5km</span>
          <button class="nav-btn">导航</button>
        </div>
      </div>

      <div class="store-item animate-in delay-3">
        <div class="store-img">🏪</div>
        <div class="store-detail">
          <h4>刘丽德健康·龙湖店</h4>
          <div class="store-addr">杭州市滨江区龙湖天街2楼 S216</div>
          <div class="store-tags">
            <span class="store-tag" style="background: #FFF0F0; color: var(--danger);">休息中</span>
            <span class="store-tag" style="background: var(--accent-light); color: var(--accent-dark);">WiFi</span>
            <span class="store-tag" style="background: var(--secondary-light); color: var(--secondary-dark);">停车场</span>
          </div>
        </div>
        <div class="store-dist">
          <span class="dist-text">5.8km</span>
          <button class="nav-btn">导航</button>
        </div>
      </div>
      <div style="height: 24px;"></div>
    </div>

    <div class="tab-bar">
      <a href="member-home.html" class="tab-item" style="text-decoration:none;">
        <span class="tab-icon"><i class="van-icon van-icon-home-o"></i></span>
        <span class="tab-label">首页</span>
      </a>
      <a href="member-profile.html" class="tab-item" style="text-decoration:none;">
        <span class="tab-icon"><i class="van-icon van-icon-user-o"></i></span>
        <span class="tab-label">我的</span>
      </a>
    </div>
    <div class="safe-bottom"></div>
  </div>

  <script src="../js/prototype.js"></script>
</body>
</html>
