<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>会员列表 - POS H5 原型</title>
  <link rel="stylesheet" href="../css/design-system.css">
  <style>
    /* ===== Nav ===== */
    .nav-bar {
      background: linear-gradient(135deg, #4A6CF7 0%, #6B8AFF 100%);
    }
    .nav-bar .nav-title { color: white; }
    .nav-bar .nav-back { color: white; }
    .nav-bar .nav-right { color: white; }

    /* ===== Search ===== */
    .search-area {
      padding: var(--space-md) var(--space-lg) 0;
      background: var(--bg-white);
    }
    .search-box {
      display: flex; align-items: center; gap: var(--space-sm);
      height: 44px; border-radius: var(--radius-pill);
      background: var(--bg-primary); padding: 0 var(--space-lg);
    }
    .search-box .s-icon { font-size: 16px; flex-shrink: 0; }
    .search-box .s-input {
      flex: 1; border: none; background: transparent;
      font: var(--font-body); color: var(--text-primary); outline: none;
    }
    .search-box .s-input::placeholder { color: var(--text-placeholder); }

    /* ===== Filter tabs ===== */
    .filter-tabs {
      display: flex;
      background: var(--bg-white);
      padding: var(--space-md) var(--space-lg);
      gap: var(--space-sm);
    }
    .filter-tab {
      padding: 6px 16px; border-radius: var(--radius-pill);
      font: 500 12px / 1 var(--font-family);
      color: var(--text-tertiary); background: var(--bg-primary);
      cursor: pointer; transition: all 0.2s;
      border: none;
    }
    .filter-tab.active {
      background: #4A6CF7; color: white;
    }
    .member-count {
      font: 400 11px / 1 var(--font-family); color: var(--text-tertiary);
      padding: 0 var(--space-lg) var(--space-sm);
      background: var(--bg-white);
    }

    /* ===== Member card ===== */
    .m-card {
      display: flex; align-items: center; gap: var(--space-md);
      padding: var(--space-md) var(--space-lg);
      background: var(--bg-white);
      margin-bottom: 1px;
      cursor: pointer; transition: background 0.15s;
      text-decoration: none;
    }
    .m-card:active { background: var(--bg-primary); }
    .m-avatar {
      width: 44px; height: 44px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; flex-shrink: 0;
    }
    .m-info { flex: 1; min-width: 0; }
    .m-info-top { display: flex; align-items: center; gap: 6px; }
    .m-name { font: 600 15px / 1.3 var(--font-family); color: var(--text-primary); }
    .m-level {
      padding: 1px 8px; border-radius: var(--radius-pill);
      font: 500 10px / 1 var(--font-family);
    }
    .m-phone { font: 400 12px / 1.3 var(--font-family); color: var(--text-tertiary); margin-top: 2px; }
    .m-tags { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 4px; }
    .m-tag {
      padding: 2px 8px; border-radius: var(--radius-pill);
      font: 400 10px / 1 var(--font-family);
    }
    .m-right {
      display: flex; flex-direction: column; align-items: flex-end; gap: 2px; flex-shrink: 0;
    }
    .m-date { font: 400 11px / 1 var(--font-family); color: var(--text-tertiary); }
    .m-arrow { font-size: 14px; color: var(--text-placeholder); }

    .page-nav {
      position: fixed; top: 12px; right: 12px; z-index: 100; display: flex; gap: 6px;
    }
    .page-nav a {
      display: inline-flex; padding: 6px 12px; border-radius: var(--radius-pill);
      font: 500 11px / 1 var(--font-family); background: rgba(255,255,255,0.9);
      color: var(--primary); box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      text-decoration: none; transition: all 0.2s;
    }
    .page-nav a:hover { background: var(--primary); color: white; }
    .page-nav a.active { background: var(--primary); color: white; }
  </style>
</head>

  <script src="../js/prototype.js"></script>
  <script>
    // Filter members by level
    function filterMembers(level, btn) {
      // Update tab active state
      document.querySelectorAll('.filter-tab').forEach(function(t) { t.classList.remove('active'); });
      btn.classList.add('active');

      // Show/hide cards
      var cards = document.querySelectorAll('.m-card');
      var count = 0;
      cards.forEach(function(card) {
        if (level === 'all' || card.getAttribute('data-level') === level) {
          card.style.display = 'flex';
          count++;
        } else {
          card.style.display = 'none';
        }
      });
      document.getElementById('memberCount').textContent = '共 ' + count + ' 位会员';
    }

    // Search filter
    var searchInput = document.getElementById('searchInput');
    if (searchInput) {
      searchInput.addEventListener('input', function() {
        var keyword = this.value.trim().toLowerCase();
        var cards = document.querySelectorAll('.m-card');
        var count = 0;
        cards.forEach(function(card) {
          var name = card.querySelector('.m-name').textContent.toLowerCase();
          var phone = card.querySelector('.m-phone').textContent;
          if (!keyword || name.indexOf(keyword) > -1 || phone.indexOf(keyword) > -1) {
            card.style.display = 'flex';
            count++;
          } else {
            card.style.display = 'none';
          }
        });
        document.getElementById('memberCount').textContent = '共 ' + count + ' 位会员';
      });
    }
  </script>
