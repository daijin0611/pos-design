<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>M8-M9 积分 - POS H5 原型</title>
  <link rel="stylesheet" href="../css/design-system.css">
  <style>
    /* Points tabs */
    .points-tabs {
      display: flex;
      background: var(--bg-white);
      border-bottom: 1px solid var(--border-light);
    }
    .points-tab {
      flex: 1;
      text-align: center;
      padding: var(--space-md) 0;
      font: 500 13px / 1 var(--font-family);
      color: var(--text-tertiary);
      position: relative;
      cursor: pointer;
    }
    .points-tab.active {
      color: var(--accent-dark);
      font-weight: 600;
    }
    .points-tab.active::after {
      content: '';
      position: absolute;
      bottom: 0; left: 50%; transform: translateX(-50%);
      width: 24px; height: 3px;
      background: var(--accent);
      border-radius: 2px;
    }

    .header-area {
      background: linear-gradient(135deg, #E8A849 0%, #F5C462 100%);
      padding: 0 var(--space-lg) var(--space-xl);
      position: relative;
    }
    .header-area::after {
      content: '';
      position: absolute;
      bottom: -20px; left: 0; right: 0;
      height: 40px;
      background: var(--bg-primary);
      border-radius: 24px 24px 0 0;
    }
    .header-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: var(--space-sm) 0 var(--space-md);
    }
    .points-big {
      text-align: center;
      padding: var(--space-xl) 0;
      position: relative;
      z-index: 1;
    }
    .points-big .label {
      font: 400 13px / 1 var(--font-family);
      color: rgba(255,255,255,0.8);
    }
    .points-big .amount {
      font: 700 42px / 1.2 var(--font-family);
      color: white;
      margin-top: 8px;
    }
    .points-stats {
      display: flex;
      justify-content: center;
      gap: var(--space-xxl);
      margin-top: var(--space-md);
      position: relative;
      z-index: 1;
    }
    .points-stat { text-align: center; }
    .points-stat .ps-value {
      font: 700 16px / 1.2 var(--font-family);
      color: rgba(255,255,255,0.95);
    }
    .points-stat .ps-label {
      font: 400 10px / 1 var(--font-family);
      color: rgba(255,255,255,0.6);
      margin-top: 2px;
    }

    /* Exchange products */
    .product-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--space-md);
      padding: 0 var(--space-lg);
    }
    .product-card {
      background: var(--bg-white);
      border-radius: var(--radius-lg);
      overflow: hidden;
      box-shadow: var(--shadow-card);
      cursor: pointer;
      transition: transform 0.2s;
    }
    .product-card:active { transform: scale(0.97); }
    .product-img {
      height: 120px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      background: var(--bg-primary);
    }
    .product-info {
      padding: var(--space-md);
    }
    .product-info h4 {
      font: 500 14px / 1.3 var(--font-family);
      color: var(--text-primary);
    }
    .product-info p {
      font: 400 11px / 1.3 var(--font-family);
      color: var(--text-tertiary);
      margin-top: 2px;
    }
    .product-points {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: var(--space-sm);
    }
    .pp-value {
      font: 700 14px / 1 var(--font-family);
      color: var(--accent);
    }
    .pp-value::before { content: ''; font-size: 10px; }
    .pp-btn {
      padding: 4px 10px;
      border-radius: var(--radius-pill);
      background: var(--accent);
      color: white;
      font: 500 10px / 1 var(--font-family);
      border: none;
      cursor: pointer;
    }

    /* Points detail */
    .points-detail-item {
      display: flex;
      align-items: center;
      gap: var(--space-md);
      padding: var(--space-md) var(--space-lg);
      background: var(--bg-white);
      border-radius: var(--radius-md);
      margin: 0 var(--space-lg) var(--space-sm);
      box-shadow: var(--shadow-card);
    }
    .pd-icon {
      width: 36px; height: 36px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; flex-shrink: 0;
    }
    .pd-info { flex: 1; }
    .pd-info h4 { font: 500 13px / 1.3 var(--font-family); color: var(--text-primary); }
    .pd-info p { font: 400 11px / 1.3 var(--font-family); color: var(--text-tertiary); margin-top: 2px; }
    .pd-amount { font: 600 14px / 1 var(--font-family); flex-shrink: 0; }
    .pd-amount.plus { color: var(--accent); }
    .pd-amount.minus { color: var(--text-primary); }

    .page-nav {
      position: fixed; top: 12px; right: 12px; z-index: 100; display: flex; gap: 6px;
    }
    .page-nav a {
      display: inline-flex; padding: 6px 12px; border-radius: var(--radius-pill);
      font: 500 11px / 1 var(--font-family); background: rgba(255,255,255,0.9);
      color: var(--primary); box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      text-decoration: none; transition: all 0.2s;
    }
    .page-nav a:hover { background: var(--primary); color: white; }
    .page-nav a.active { background: var(--primary); color: white; }
  </style>
</head>
<body>
  <div class="page-nav">
    <a href="member-home.html" class="active">会员</a>
    <a href="staff-home.html">员工</a>
    <a href="admin-home.html">管理</a>
    <a href="global-login.html">登录</a>
  </div>

  <div class="phone-frame">
    <div class="status-bar light">9:41</div>

    <div class="page-content">
      <div class="header-area">
        <div class="header-top">
          <div class="nav-back" onclick="history.back()" style="color:white;">‹</div>
          <span style="font:600 17px/1 var(--font-family); color:white; position:absolute; left:50%; transform:translateX(-50%);">我的积分</span>
        </div>
        <div class="points-big animate-in">
          <div class="label">可用积分</div>
          <div class="amount">1,560</div>
          <div class="points-stats">
            <div class="points-stat">
              <div class="ps-value">2,840</div>
              <div class="ps-label">累计获得</div>
            </div>
            <div class="points-stat">
              <div class="ps-value">1,280</div>
              <div class="ps-label">已兑换</div>
            </div>
            <div class="points-stat">
              <div class="ps-value">Gold</div>
              <div class="ps-label">会员等级</div>
            </div>
          </div>
        </div>
      </div>

      <!-- Tabs -->
      <div class="points-tabs animate-in delay-1" style="margin-top: 8px;">
        <div class="points-tab active">积分明细</div>
        <div class="points-tab">积分兑换</div>
      </div>

      <!-- Points detail -->
      <div style="padding-top: var(--space-md);">
        <div class="points-detail-item animate-in delay-1">
          <div class="pd-icon" style="background: var(--primary-light);"><i class="van-icon van-icon-service-o" style="color: #2CB5A0;"></i></div>
          <div class="pd-info">
            <h4>消费获得积分</h4>
            <p>肩颈调理 · 2026-05-29</p>
          </div>
          <div class="pd-amount plus">+30</div>
        </div>
        <div class="points-detail-item animate-in delay-2">
          <div class="pd-icon" style="background: var(--accent-light);"><i class="van-icon van-icon-gift-o" style="color: #E8A849;"></i></div>
          <div class="pd-info">
            <h4>积分兑换</h4>
            <p>肩颈体验券 · 2026-05-20</p>
          </div>
          <div class="pd-amount minus">-500</div>
        </div>
        <div class="points-detail-item">
          <div class="pd-icon" style="background: var(--primary-light);"><i class="van-icon van-icon-service-o" style="color: #2CB5A0;"></i></div>
          <div class="pd-info">
            <h4>消费获得积分</h4>
            <p>全身精油SPA · 2026-05-25</p>
          </div>
          <div class="pd-amount plus">+50</div>
        </div>
        <div class="points-detail-item">
          <div class="pd-icon" style="background: var(--secondary-light);"><i class="van-icon van-icon-cake-o" style="color: #F5A0B5;"></i></div>
          <div class="pd-info">
            <h4>生日赠送积分</h4>
            <p>系统赠送 · 2026-05-15</p>
          </div>
          <div class="pd-amount plus">+200</div>
        </div>
        <div class="points-detail-item">
          <div class="pd-icon" style="background: var(--primary-light);"><i class="van-icon van-icon-service-o" style="color: #2CB5A0;"></i></div>
          <div class="pd-info">
            <h4>消费获得积分</h4>
            <p>面部护理 · 2026-05-10</p>
          </div>
          <div class="pd-amount plus">+20</div>
        </div>
      </div>

      <div style="height: 24px;"></div>
    </div>

    <div class="tab-bar">
      <div class="tab-item" onclick="location.href='member-home.html'">
        <span class="tab-icon"><i class="van-icon van-icon-home-o"></i></span>
        <span class="tab-label">首页</span>
      </div>
      <div class="tab-item">
        <span class="tab-icon"><i class="van-icon van-icon-calendar-o"></i></span>
        <span class="tab-label">预约</span>
      </div>
      <div class="tab-item">
        <span class="tab-icon"><i class="van-icon van-icon-coupon-o"></i></span>
        <span class="tab-label">优惠券</span>
      </div>
      <div class="tab-item">
        <span class="tab-icon"><i class="van-icon van-icon-user-o"></i></span>
        <span class="tab-label">我的</span>
      </div>
    </div>
    <div class="safe-bottom"></div>
  </div>

  <script src="../js/prototype.js"></script>
</body>
</html>
