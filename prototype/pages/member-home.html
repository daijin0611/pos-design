<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>会员首页 - POS H5 原型</title>
  <link rel="stylesheet" href="../css/design-system.css">
  <style>
    .header-area {
      background: var(--primary-gradient);
      padding: 0 var(--space-lg) var(--space-xl);
      position: relative;
    }

    .header-area::after {
      content: '';
      position: absolute;
      bottom: -20px;
      left: 0;
      right: 0;
      height: 40px;
      background: var(--bg-primary);
      border-radius: 24px 24px 0 0;
    }

    .header-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: var(--space-sm) 0 var(--space-md);
    }

    .store-switch {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 6px 14px;
      border-radius: var(--radius-pill);
      background: rgba(255,255,255,0.2);
      font: 500 13px / 1 var(--font-family);
      color: white;
    }

    .greeting-block h2 {
      font: 600 18px / 1.3 var(--font-family);
      color: var(--text-inverse);
    }

    .greeting-block p {
      font: 400 12px / 1.4 var(--font-family);
      color: rgba(255,255,255,0.75);
      margin-top: 2px;
    }

    .avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: rgba(255,255,255,0.25);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
    }

    .balance-card {
      background: var(--bg-white);
      border-radius: var(--radius-xl);
      padding: var(--space-lg) var(--space-xl);
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: relative;
      z-index: 1;
      box-shadow: 0 4px 24px rgba(44, 181, 160, 0.15);
    }

    .balance-info .label {
      font: 400 12px / 1 var(--font-family);
      color: var(--text-tertiary);
    }

    .balance-info .amount {
      font: 700 28px / 1.2 var(--font-family);
      color: var(--primary);
      margin-top: 4px;
    }

    .balance-info .amount::before {
      content: '¥ ';
      font-size: 16px;
      font-weight: 600;
    }

    .card-summary {
      display: flex;
      align-items: center;
      gap: 4px;
      margin-top: 6px;
    }
    .card-summary .card-tag {
      font: 500 11px / 1 var(--font-family);
      color: var(--accent-dark);
      background: var(--accent-light);
      padding: 2px 8px;
      border-radius: var(--radius-pill);
      display: inline-flex;
      align-items: center;
      gap: 3px;
    }
    .card-summary .card-divider {
      color: var(--text-placeholder);
      font-size: 11px;
    }
    .card-summary .card-detail {
      font: 400 10px / 1 var(--font-family);
      color: var(--text-tertiary);
    }

    .balance-stats {
      display: flex;
      gap: var(--space-xl);
    }

    .stat-item {
      text-align: center;
    }

    .stat-item .stat-value {
      font: 700 18px / 1.2 var(--font-family);
    }

    .stat-item .stat-label {
      font: 400 10px / 1.3 var(--font-family);
      color: var(--text-tertiary);
      margin-top: 2px;
    }

    .stat-item.points .stat-value { color: var(--accent); }
    .stat-item.coupons .stat-value { color: var(--secondary); }
    .stat-item.cards .stat-value { color: var(--primary); }

    /* Entry cards (会员卡 / 优惠券) */
    .entry-cards {
      padding: var(--space-md) var(--space-lg) var(--space-sm);
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      gap: var(--space-sm);
    }
    .entry-card {
      display: flex;
      align-items: center;
      gap: var(--space-md);
      padding: var(--space-md) var(--space-lg);
      background: var(--bg-white);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-card);
      transition: transform 0.15s;
    }
    .entry-card:active { transform: scale(0.98); }
    .ec-icon {
      width: 44px; height: 44px; border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; flex-shrink: 0;
    }
    .ec-text { flex: 1; min-width: 0; }
    .ec-title {
      font: 600 14px / 1.3 var(--font-family);
      color: var(--text-primary);
    }
    .ec-desc {
      font: 400 11px / 1.3 var(--font-family);
      color: var(--text-tertiary);
      margin-top: 2px;
    }
    .ec-arrow {
      color: var(--text-placeholder);
      font-size: 14px;
    }

    .action-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: var(--space-sm);
    }

    .action-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      cursor: pointer;
    }

    .action-icon {
      width: 50px;
      height: 50px;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      transition: transform 0.2s;
    }

    .action-item:active .action-icon {
      transform: scale(0.92);
    }

    .action-label {
      font: 500 11px / 1.2 var(--font-family);
      color: var(--text-secondary);
    }

    /* Appointment card */
    .apt-card {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: var(--space-lg);
      background: var(--bg-white);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-card);
    }

    .apt-info h4 {
      font: 600 15px / 1.3 var(--font-family);
      color: var(--text-primary);
    }

    .apt-info p {
      font: 400 12px / 1.4 var(--font-family);
      color: var(--text-tertiary);
      margin-top: 4px;
    }

    /* Transaction list */
    .tx-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: var(--space-md) var(--space-lg);
      background: var(--bg-white);
      border-radius: var(--radius-md);
      margin-bottom: var(--space-sm);
    }

    .tx-info h4 {
      font: 500 14px / 1.3 var(--font-family);
      color: var(--text-primary);
    }

    .tx-info p {
      font: 400 11px / 1.3 var(--font-family);
      color: var(--text-tertiary);
      margin-top: 2px;
    }

    .tx-amount {
      font: 600 15px / 1 var(--font-family);
    }

    .tx-amount.expense { color: var(--text-primary); }
    .tx-amount.income { color: var(--primary); }

    /* Notice bar */
    .notice-bar {
      display: flex;
      align-items: center;
      gap: var(--space-sm);
      padding: var(--space-sm) var(--space-lg);
      margin: 0 var(--space-lg) var(--space-sm);
      background: var(--accent-light);
      border-radius: var(--radius-md);
      font: 400 12px / 1.4 var(--font-family);
      color: var(--accent-dark);
    }

    .notice-bar .notice-icon { font-size: 14px; }

    /* Store dropdown */
    .store-dropdown {
      display: none;
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      z-index: 500;
    }
    .store-dropdown.show { display: block; }
    .store-dropdown-mask {
      position: absolute; inset: 0;
      background: rgba(0,0,0,0.3);
    }
    .store-dropdown-inner {
      position: absolute;
      top: 110px; left: 50%;
      transform: translateX(-50%);
      background: var(--bg-white);
      border-radius: var(--radius-lg);
      box-shadow: 0 8px 32px rgba(0,0,0,0.15);
      padding: var(--space-sm) 0;
      min-width: 240px;
      z-index: 1;
    }
    .store-option {
      display: flex; align-items: center; gap: var(--space-sm);
      padding: var(--space-sm) var(--space-lg);
      cursor: pointer;
    }
    .store-option:active { background: var(--bg-primary); }
    .store-option .so-dot {
      width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
    }
    .store-option .so-name {
      font: 500 13px / 1.3 var(--font-family); color: var(--text-primary);
    }
    .store-option .so-balance {
      font: 400 11px / 1.3 var(--font-family); color: var(--text-tertiary); margin-top: 1px;
    }
    .store-option .so-check { color: var(--primary); font-size: 16px; visibility: hidden; }
    .store-option.active .so-check { visibility: visible; }
    .store-option.active .so-name { color: var(--primary); font-weight: 600; }

    /* Page nav */
    .page-nav {
      position: fixed;
      top: 12px;
      right: 12px;
      z-index: 100;
      display: flex;
      gap: 6px;
    }

    .page-nav a {
      display: inline-flex;
      padding: 6px 12px;
      border-radius: var(--radius-pill);
      font: 500 11px / 1 var(--font-family);
      background: rgba(255,255,255,0.9);
      color: var(--primary);
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      text-decoration: none;
      transition: all 0.2s;
    }

    .page-nav a:hover {
      background: var(--primary);
      color: white;
    }

    .page-nav a.active {
      background: var(--primary);
      color: white;
    }
  </style>
</head>
<body>
  <div class="page-nav">
    <a href="member-home.html" class="active">会员</a>
    <a href="staff-home.html">员工</a>
    <a href="admin-home.html">管理</a>
    <a href="global-login.html">登录</a>
  </div>

  <div class="phone-frame">
    <!-- Status bar -->
    <div class="status-bar light">9:41</div>

    <!-- Scrollable content -->
    <div class="page-content">
      <!-- Header with gradient -->
      <div class="header-area">
        <div class="header-top">
          <div class="store-switch" onclick="document.querySelector('.store-dropdown').classList.toggle('show')">
            <i class="van-icon van-icon-location-o" style="font-size:14px;"></i>
            <span>万达店</span>
            <i class="van-icon van-icon-arrow-down" style="font-size:10px;"></i>
          </div>
          <div class="avatar"><i class="van-icon van-icon-user-o" style="color: white;"></i></div>
        </div>

        <div class="greeting-block animate-in">
          <h2>你好，张小姐</h2>
          <p>欢迎来到刘丽德健康</p>
        </div>

        <!-- 可点击卡片：余额 -->
        <a href="member-balance.html" class="balance-card animate-in delay-1" style="text-decoration:none;">
          <div class="balance-info">
            <div class="label">账户余额（元）</div>
            <div class="amount">5,280.00</div>
          </div>
          <div class="balance-stats">
            <div class="stat-item cards">
              <div class="stat-value">3</div>
              <div class="stat-label">会员卡</div>
            </div>
            <div class="stat-item coupons">
              <div class="stat-value">3</div>
              <div class="stat-label">优惠券</div>
            </div>
          </div>
        </a>
      </div>

      <!-- Recent transactions -->
      <div class="section">
        <div class="section-header">
          <span class="section-title">最近消费</span>
          <a href="member-records.html" class="section-more">查看全部 ›</a>
        </div>
        <div class="tx-item">
          <div class="tx-info">
            <h4>肩颈调理</h4>
            <p>2026-05-20 · 万达店</p>
          </div>
          <span class="tx-amount expense">- ¥298.00</span>
        </div>
        <div class="tx-item">
          <div class="tx-info">
            <h4>余额充值</h4>
            <p>2026-05-15 · 微信支付</p>
          </div>
          <span class="tx-amount income">+ ¥2,000.00</span>
        </div>
        <div class="tx-item">
          <div class="tx-info">
            <h4>全身精油SPA</h4>
            <p>2026-05-10 · 万达店</p>
          </div>
          <span class="tx-amount expense">- ¥498.00</span>
        </div>
      </div>

      <div style="height: 24px;"></div>
    </div>

    <!-- Store dropdown -->
    <div class="store-dropdown">
      <div class="store-dropdown-mask" onclick="document.querySelector('.store-dropdown').classList.remove('show')"></div>
      <div class="store-dropdown-inner">
        <div class="store-option active" onclick="document.querySelector('.store-dropdown').classList.remove('show')">
          <span class="so-dot" style="background: #C9A96E;"></span>
          <div>
            <div class="so-name">万达店</div>
            <div class="so-balance">当前门店</div>
          </div>
          <span class="so-check"><i class="van-icon van-icon-success"></i></span>
        </div>
        <div class="store-option" onclick="document.querySelector('.store-dropdown').classList.remove('show')">
          <span class="so-dot" style="background: #8E9AAF;"></span>
          <div>
            <div class="so-name">银泰店</div>
            <div class="so-balance">切换</div>
          </div>
          <span class="so-check"><i class="van-icon van-icon-success"></i></span>
        </div>
        <div class="store-option" onclick="document.querySelector('.store-dropdown').classList.remove('show')">
          <span class="so-dot" style="background: #2CB5A0;"></span>
          <div>
            <div class="so-name">龙湖店</div>
            <div class="so-balance">切换</div>
          </div>
          <span class="so-check"><i class="van-icon van-icon-success"></i></span>
        </div>
      </div>
    </div>

    <!-- Tab Bar -->
    <div class="tab-bar">
      <a href="member-home.html" class="tab-item active" style="text-decoration:none;">
        <span class="tab-icon"><i class="van-icon van-icon-home-o"></i></span>
        <span class="tab-label">首页</span>
      </a>
      <a href="member-profile.html" class="tab-item" style="text-decoration:none;">
        <span class="tab-icon"><i class="van-icon van-icon-user-o"></i></span>
        <span class="tab-label">我的</span>
      </a>
    </div>
    <div class="safe-bottom"></div>
  </div>
</body>
</html>
