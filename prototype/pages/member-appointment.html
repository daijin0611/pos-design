<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>M4 我的预约 - POS H5 原型</title>
  <link rel="stylesheet" href="../css/design-system.css">
  <style>
    /* Sub tabs */
    .sub-tabs {
      display: flex;
      background: var(--bg-white);
      border-bottom: 1px solid var(--border-light);
      padding: 0 var(--space-lg);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .sub-tab {
      flex: 1;
      text-align: center;
      padding: var(--space-md) 0;
      font: 500 13px / 1 var(--font-family);
      color: var(--text-tertiary);
      position: relative;
      cursor: pointer;
    }
    .sub-tab.active {
      color: var(--primary);
      font-weight: 600;
    }
    .sub-tab.active::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 24px;
      height: 3px;
      background: var(--primary);
      border-radius: 2px;
    }
    .sub-tab .tab-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 16px;
      height: 16px;
      border-radius: 8px;
      background: var(--primary);
      color: white;
      font: 600 9px / 1 var(--font-family);
      margin-left: 2px;
      padding: 0 4px;
    }

    /* Appointment card */
    .apt-card {
      margin: 0 var(--space-lg) var(--space-md);
      background: var(--bg-white);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-card);
      overflow: hidden;
      transition: transform 0.15s;
      cursor: pointer;
    }
    .apt-card:active {
      transform: scale(0.98);
    }

    /* Card top — status stripe */
    .apt-status-stripe {
      height: 4px;
      width: 100%;
    }
    .apt-status-stripe.confirmed { background: var(--primary); }
    .apt-status-stripe.pending { background: var(--accent); }
    .apt-status-stripe.completed { background: var(--success); }
    .apt-status-stripe.cancelled { background: var(--text-placeholder); }

    /* Card body */
    .apt-body {
      padding: var(--space-lg);
    }
    .apt-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: var(--space-md);
    }
    .apt-title {
      font: 600 15px / 1.3 var(--font-family);
      color: var(--text-primary);
    }
    .apt-badge {
      padding: 3px 10px;
      border-radius: var(--radius-pill);
      font: 500 11px / 1 var(--font-family);
      flex-shrink: 0;
    }
    .apt-badge.confirmed { background: var(--primary-light); color: var(--primary); }
    .apt-badge.pending { background: var(--accent-light); color: var(--accent-dark); }
    .apt-badge.completed { background: #E8F8E8; color: var(--success); }
    .apt-badge.cancelled { background: var(--bg-primary); color: var(--text-placeholder); }

    /* Detail rows */
    .apt-detail-row {
      display: flex;
      align-items: center;
      gap: var(--space-sm);
      padding: 3px 0;
    }
    .apt-detail-icon {
      font-size: 14px;
      color: var(--text-placeholder);
      width: 18px;
      text-align: center;
      flex-shrink: 0;
    }
    .apt-detail-text {
      font: 400 13px / 1.4 var(--font-family);
      color: var(--text-secondary);
    }

    /* Service items in apt */
    .apt-services {
      margin-top: var(--space-md);
      padding-top: var(--space-md);
      border-top: 1px dashed var(--border-light);
    }
    .apt-service-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 4px 0;
    }
    .apt-svc-name {
      font: 400 13px / 1.3 var(--font-family);
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .apt-svc-name .svc-dot {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: var(--text-placeholder);
    }
    .apt-svc-price {
      font: 500 13px / 1 var(--font-family);
      color: var(--text-primary);
    }

    /* Card actions */
    .apt-actions {
      display: flex;
      gap: var(--space-sm);
      margin-top: var(--space-md);
      padding-top: var(--space-md);
      border-top: 1px solid var(--border-light);
    }
    .apt-btn {
      flex: 1;
      padding: 8px 0;
      border-radius: var(--radius-md);
      font: 500 12px / 1 var(--font-family);
      text-align: center;
      cursor: pointer;
      transition: all 0.15s;
      border: none;
    }
    .apt-btn.primary {
      background: var(--primary);
      color: white;
    }
    .apt-btn.primary:active { background: #25A090; }
    .apt-btn.outline {
      background: var(--bg-white);
      color: var(--text-secondary);
      border: 1px solid var(--border);
    }
    .apt-btn.outline:active { background: var(--bg-primary); }
    .apt-btn.danger-outline {
      background: var(--bg-white);
      color: var(--danger);
      border: 1px solid var(--danger);
    }
    .apt-btn.danger-outline:active { background: #FFF0F0; }

    /* FAB — new appointment */
    .fab {
      position: absolute;
      bottom: 80px;
      right: var(--space-lg);
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: var(--primary);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      box-shadow: 0 4px 16px rgba(44, 181, 160, 0.35);
      cursor: pointer;
      z-index: 20;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .fab:active {
      transform: scale(0.9);
      box-shadow: 0 2px 8px rgba(44, 181, 160, 0.25);
    }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 60px var(--space-xl);
    }
    .empty-state .empty-icon {
      font-size: 48px;
      color: var(--text-placeholder);
      margin-bottom: var(--space-lg);
    }
    .empty-state .empty-title {
      font: 500 15px / 1.3 var(--font-family);
      color: var(--text-secondary);
    }
    .empty-state .empty-desc {
      font: 400 13px / 1.4 var(--font-family);
      color: var(--text-placeholder);
      margin-top: var(--space-sm);
    }

    /* List footer */
    .list-footer {
      text-align: center;
      padding: var(--space-lg) 0 var(--space-xxl);
      font: 400 12px / 1 var(--font-family);
      color: var(--text-placeholder);
    }

    .page-nav {
      position: fixed; top: 12px; right: 12px; z-index: 100; display: flex; gap: 6px;
    }
    .page-nav a {
      display: inline-flex; padding: 6px 12px; border-radius: var(--radius-pill);
      font: 500 11px / 1 var(--font-family); background: rgba(255,255,255,0.9);
      color: var(--primary); box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      text-decoration: none; transition: all 0.2s;
    }
    .page-nav a:hover { background: var(--primary); color: white; }
    .page-nav a.active { background: var(--primary); color: white; }
  </style>
</head>
<body>
  <div class="page-nav">
    <a href="member-home.html" class="active">会员</a>
    <a href="staff-home.html">员工</a>
    <a href="admin-home.html">管理</a>
    <a href="global-login.html">登录</a>
  </div>

  <div class="phone-frame">
    <div class="status-bar">9:41</div>
    <div class="nav-bar">
      <div class="nav-back" onclick="history.back()">‹</div>
      <span class="nav-title">我的预约</span>
    </div>

    <!-- Sub tabs -->
    <div class="sub-tabs">
      <div class="sub-tab active">即将到来 <span class="tab-badge">2</span></div>
      <div class="sub-tab">已完成</div>
      <div class="sub-tab">已取消</div>
    </div>

    <div class="page-content" style="padding-top: var(--space-md);">
      <!-- Upcoming appointment 1 — confirmed -->
      <div class="apt-card animate-in">
        <div class="apt-status-stripe confirmed"></div>
        <div class="apt-body">
          <div class="apt-header">
            <div class="apt-title">万达店</div>
            <span class="apt-badge confirmed">已确认</span>
          </div>
          <div class="apt-detail-row">
            <span class="apt-detail-icon"><i class="van-icon van-icon-clock-o"></i></span>
            <span class="apt-detail-text">明天（5月29日）周五 14:00</span>
          </div>
          <div class="apt-detail-row">
            <span class="apt-detail-icon"><i class="van-icon van-icon-contact"></i></span>
            <span class="apt-detail-text">张技师</span>
          </div>
          <div class="apt-services">
            <div class="apt-service-item">
              <span class="apt-svc-name"><span class="svc-dot"></span>肩颈深度调理</span>
              <span class="apt-svc-price">¥298.00</span>
            </div>
            <div class="apt-service-item">
              <span class="apt-svc-name"><span class="svc-dot"></span>全身精油SPA</span>
              <span class="apt-svc-price">¥498.00</span>
            </div>
          </div>
          <div class="apt-actions">
            <button class="apt-btn outline">改期</button>
            <button class="apt-btn danger-outline">取消预约</button>
          </div>
        </div>
      </div>

      <!-- Upcoming appointment 2 — pending -->
      <div class="apt-card animate-in delay-1">
        <div class="apt-status-stripe pending"></div>
        <div class="apt-body">
          <div class="apt-header">
            <div class="apt-title">银泰店</div>
            <span class="apt-badge pending">待确认</span>
          </div>
          <div class="apt-detail-row">
            <span class="apt-detail-icon"><i class="van-icon van-icon-clock-o"></i></span>
            <span class="apt-detail-text">6月2日 周一 10:00</span>
          </div>
          <div class="apt-detail-row">
            <span class="apt-detail-icon"><i class="van-icon van-icon-contact"></i></span>
            <span class="apt-detail-text">赵技师</span>
          </div>
          <div class="apt-services">
            <div class="apt-service-item">
              <span class="apt-svc-name"><span class="svc-dot"></span>面部护理</span>
              <span class="apt-svc-price">¥198.00</span>
            </div>
          </div>
          <div class="apt-actions">
            <button class="apt-btn danger-outline">取消预约</button>
          </div>
        </div>
      </div>

      <!-- Completed appointment -->
      <div class="apt-card animate-in delay-2">
        <div class="apt-status-stripe completed"></div>
        <div class="apt-body">
          <div class="apt-header">
            <div class="apt-title">万达店</div>
            <span class="apt-badge completed">已完成</span>
          </div>
          <div class="apt-detail-row">
            <span class="apt-detail-icon"><i class="van-icon van-icon-clock-o"></i></span>
            <span class="apt-detail-text">5月20日 周三 15:00</span>
          </div>
          <div class="apt-detail-row">
            <span class="apt-detail-icon"><i class="van-icon van-icon-contact"></i></span>
            <span class="apt-detail-text">王技师</span>
          </div>
          <div class="apt-services">
            <div class="apt-service-item">
              <span class="apt-svc-name"><span class="svc-dot"></span>面部护理</span>
              <span class="apt-svc-price">¥198.00</span>
            </div>
            <div class="apt-service-item">
              <span class="apt-svc-name"><span class="svc-dot"></span>足部调理</span>
              <span class="apt-svc-price">¥128.00</span>
            </div>
          </div>
          <div class="apt-actions">
            <button class="apt-btn primary">再次预约</button>
            <button class="apt-btn outline">查看评价</button>
          </div>
        </div>
      </div>

      <!-- Completed appointment 2 -->
      <div class="apt-card animate-in delay-3">
        <div class="apt-status-stripe completed"></div>
        <div class="apt-body">
          <div class="apt-header">
            <div class="apt-title">万达店</div>
            <span class="apt-badge completed">已完成</span>
          </div>
          <div class="apt-detail-row">
            <span class="apt-detail-icon"><i class="van-icon van-icon-clock-o"></i></span>
            <span class="apt-detail-text">5月10日 周日 14:00</span>
          </div>
          <div class="apt-detail-row">
            <span class="apt-detail-icon"><i class="van-icon van-icon-contact"></i></span>
            <span class="apt-detail-text">赵技师</span>
          </div>
          <div class="apt-services">
            <div class="apt-service-item">
              <span class="apt-svc-name"><span class="svc-dot"></span>足部调理</span>
              <span class="apt-svc-price">¥128.00</span>
            </div>
          </div>
          <div class="apt-actions">
            <button class="apt-btn primary">再次预约</button>
          </div>
        </div>
      </div>

      <div class="list-footer">已显示全部预约记录</div>
    </div>

    <!-- FAB — new appointment -->
    <div class="fab" onclick="location.href='member-appointment-create.html'">
      <i class="van-icon van-icon-plus"></i>
    </div>

    <!-- Tab Bar -->
    <div class="tab-bar">
      <a href="member-home.html" class="tab-item" style="text-decoration:none;">
        <span class="tab-icon"><i class="van-icon van-icon-home-o"></i></span>
        <span class="tab-label">首页</span>
      </a>
      <a href="member-profile.html" class="tab-item" style="text-decoration:none;">
        <span class="tab-icon"><i class="van-icon van-icon-user-o"></i></span>
        <span class="tab-label">我的</span>
      </a>
    </div>
    <div class="safe-bottom"></div>
  </div>

  <script src="../js/prototype.js"></script>
</body>
</html>
